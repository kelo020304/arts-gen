}

function getDraftBodyByName(bodyName) {
  if (_draftManifest === null || !Array.isArray(_draftManifest.bodies)) {
    throw new Error('Draft manifest bodies are not initialized');
  }
  for (var i = 0; i < _draftManifest.bodies.length; i++) {
    if (_draftManifest.bodies[i].name === bodyName) {
      return _draftManifest.bodies[i];
    }
  }
  return null;
}

function getDraftJointByName(jointName) {
  if (_draftManifest === null || !Array.isArray(_draftManifest.joints)) {
    throw new Error('Draft manifest joints are not initialized');
  }
  for (var i = 0; i < _draftManifest.joints.length; i++) {
    if (_draftManifest.joints[i].name === jointName) {
      return _draftManifest.joints[i];
    }
  }
  return null;
}

function getOnlyJointForBody(bodyName) {
  if (_draftManifest === null || !Array.isArray(_draftManifest.joints)) {
    throw new Error('Draft manifest joints are not initialized');
  }
  var joints = _draftManifest.joints.filter(function(joint) {
    return joint.body === bodyName;
  });
  if (joints.length === 0) {
    return null;
  }
  if (joints.length !== 1) {
    throw new Error('Phase 3 editor supports exactly one joint per body: ' + bodyName);
  }
  return joints[0];
}

function collectDraftJointNameSet() {
  var names = Object.create(null);
  if (_draftManifest === null || !Array.isArray(_draftManifest.joints)) {
    throw new Error('Draft manifest joints are not initialized');
  }
  _draftManifest.joints.forEach(function(joint) {
    names[joint.name] = true;
  });
  return names;
}

function createUniqueJointNameForBody(bodyName) {
  var baseName = bodyName + '_joint';
  var names = collectDraftJointNameSet();
  if (!Object.prototype.hasOwnProperty.call(names, baseName)) {
    return baseName;
  }
  var suffix = 1;
  while (Object.prototype.hasOwnProperty.call(names, baseName + '_' + suffix)) {
    suffix += 1;
  }
  return baseName + '_' + suffix;
}

  var names = Object.create(null);

function readQuaternionWxyz(value, label) {
  if (!Array.isArray(value)) {
    throw new Error(label + ' must be an array');
  }
  if (value.length !== 4) {
    throw new Error(label + ' must contain exactly 4 values');
  }
  return new THREE.Quaternion(
    readFiniteNumber(value[1], label + '[1]'),
    readFiniteNumber(value[2], label + '[2]'),
    readFiniteNumber(value[3], label + '[3]'),
    readFiniteNumber(value[0], label + '[0]')
  );
}

function vectorToArray(vector) {
  return [vector.x, vector.y, vector.z];
}

function quaternionToWxyzArray(quaternion) {
  return [quaternion.w, quaternion.x, quaternion.y, quaternion.z];
}

function composeMatrixFromPose(pos, quat, label) {
  return new THREE.Matrix4().compose(
    readVector3(pos, label + ' pos'),
    readQuaternionWxyz(quat, label + ' quat'),
    new THREE.Vector3(1, 1, 1)
  );
}

function decomposeMatrixToPose(matrix) {
  var pos = new THREE.Vector3();
  var quat = new THREE.Quaternion();
  var scale = new THREE.Vector3();
  matrix.decompose(pos, quat, scale);
  return {
    pos: vectorToArray(pos),
    quat: quaternionToWxyzArray(quat)
  };
}

function getDraftBodyWorldMatrix(bodyName) {
  var body = getDraftBodyByName(bodyName);
  if (body === null) {
    throw new Error('Unknown draft body: ' + bodyName);
  }
  var localMatrix = composeMatrixFromPose(body.pos, body.quat, 'Body ' + bodyName);
  if (body.parent === null || body.parent === '' || body.parent === 'world') {
    return localMatrix;
  }
  return new THREE.Matrix4().multiplyMatrices(getDraftBodyWorldMatrix(body.parent), localMatrix);
}

function getWorldQuaternionFromMatrix(matrix) {
  var pos = new THREE.Vector3();
  var quat = new THREE.Quaternion();
  var scale = new THREE.Vector3();
  matrix.decompose(pos, quat, scale);
  return quat;
}

function transformGeomIntoMergedBody(geom, oldBodyWorldMatrix, newBodyWorldInverse, label) {
  if (geom === null || typeof geom !== 'object') {
    throw new Error(label + ' must be an object');
  }
  var clonedGeom = deepCloneJson(geom);
  var geomLocalMatrix = composeMatrixFromPose(geom.pos, geom.quat, label);
  var geomNewLocalMatrix = new THREE.Matrix4()
    .multiplyMatrices(newBodyWorldInverse, oldBodyWorldMatrix)
    .multiply(geomLocalMatrix);
  var geomPose = decomposeMatrixToPose(geomNewLocalMatrix);
  clonedGeom.pos = geomPose.pos;
  clonedGeom.quat = geomPose.quat;
  return clonedGeom;
}

function collectMergedFromNames(bodies) {

      _uiState.activeJointHandle.position.z
    ];
  } else if (_uiState.activeJointEditMode === 'axis') {
    var nextAxis = new THREE.Vector3(0, 0, 1).applyQuaternion(_uiState.activeJointHandle.quaternion);
    if (nextAxis.lengthSq() === 0) {
      throw new Error('Edited joint axis must remain non-zero');
    }
    nextAxis.normalize();
    _uiState.activeJointTempAxis = [nextAxis.x, nextAxis.y, nextAxis.z];
  } else {
    throw new Error('Unsupported active joint edit mode: ' + String(_uiState.activeJointEditMode));
  }
  applyActiveJointTemporaryStateToScene();
  updateSaveButtonState();
  if (_uiState.activeJointEditMode === 'anchor') {
    updateAnchorEditorInputsFromTempState();
  } else if (_uiState.activeJointEditMode === 'axis') {
    updateAxisEditorInputsFromTempState();
  }
}

function detachTransformHandlesOnly() {
  stopAnchorPointerDrag();
  var transformControls = _uiState.transformControls;
  if (transformControls) {
    transformControls.detach();
    transformControls.visible = false;
  }
  if (_uiState.activeBodyHandle && _uiState.activeBodyHandle.parent) {
    _uiState.activeBodyHandle.parent.remove(_uiState.activeBodyHandle);
  }
  if (_uiState.activeJointHandle && _uiState.activeJointHandle.parent) {
    _uiState.activeJointHandle.parent.remove(_uiState.activeJointHandle);
  }
  _uiState.activeBodyHandle = null;
  _uiState.activeJointHandle = null;
  if (controls) {
    controls.enabled = true;
  }
}

function stopTransformEditing(options) {
  var restoreJointScene = !options || options.restoreJointScene !== false;
  if (restoreJointScene && _uiState.activeJointName !== null && getDraftJointByName(_uiState.activeJointName) !== null) {
    restoreCommittedJointScene(_uiState.activeJointName);
  }
  detachTransformHandlesOnly();
  _uiState.activeBodyEditMode = null;
  _uiState.activeBodyName = null;
  _uiState.activeJointEditMode = null;
  _uiState.activeJointName = null;
  _uiState.activeJointSnapshot = null;
  _uiState.activeJointTempType = null;
  _uiState.activeJointTempRange = null;
  _uiState.activeJointTempAnchor = null;
  _uiState.activeJointTempAxis = null;
  resetJointTransformAxisFilter();
  updateSaveButtonState();
}

function applyJointPreview(jointName, value) {
  var joint = getJointPreviewEntry(jointName);
  if (Number.isFinite(value) === false) {
    throw new Error('Joint preview value must be finite for joint ' + jointName);
  }

  if (joint.type === 'hinge') {
    joint.node.position.copy(joint.restPosition);
    joint.node.quaternion.copy(joint.restQuaternion);
    joint.node.setRotationFromAxisAngle(joint.axis, value);
  } else if (joint.type === 'slide') {
    var restAnchor = joint.restPosition;
    joint.node.quaternion.copy(joint.restQuaternion);
    joint.node.position.copy(restAnchor).addScaledVector(joint.axis, value);
  } else {
    throw new Error('Unsupported joint preview type: ' + jointName + ' (' + String(joint.type) + ')');
  }

  syncJointChildBodyPreviewTransforms(joint);
}

function syncJointChildBodyPreviewTransforms(joint) {
  if (typeof joint.bodyName !== 'string' || joint.bodyName.length === 0) {
    throw new Error('Joint preview bodyName is invalid');
  }
  if (!joint.node.parent || joint.node.parent.isObject3D !== true) {
    throw new Error('Joint preview parent bodyGroup is missing for body ' + joint.bodyName);
  }

  joint.node.updateMatrix();
  var jointBodyMotionMatrix = new THREE.Matrix4().multiplyMatrices(
    joint.node.matrix,
    new THREE.Matrix4().makeTranslation(
      joint.bodyLocalOriginOffset.x,
      joint.bodyLocalOriginOffset.y,
      joint.bodyLocalOriginOffset.z
    )
  );

  requireDraftManifest().bodies.forEach(function(body) {
    if (body.parent !== joint.bodyName) {
      return;
    }

    var bodyEntry = _mjBodyMap[body.name];
    if (!bodyEntry || !bodyEntry.bodyGroup) {
      throw new Error('Preview bodyGroup is missing for child body ' + body.name);
    }

    var previewLocalMatrix = new THREE.Matrix4().multiplyMatrices(
      jointBodyMotionMatrix,
      composeMatrixFromPose(body.pos, body.quat, 'Body ' + body.name)
    );
    var previewPos = new THREE.Vector3();
    var previewQuat = new THREE.Quaternion();
    var previewScale = new THREE.Vector3();
    previewLocalMatrix.decompose(previewPos, previewQuat, previewScale);
    bodyEntry.bodyGroup.position.copy(previewPos);
    bodyEntry.bodyGroup.quaternion.copy(previewQuat);
  });

  joint.node.parent.updateMatrixWorld(true);
}

function getJointPreviewEntry(jointName) {
  if (!Object.prototype.hasOwnProperty.call(_mjJointMap, jointName)) {
    throw new Error('Joint preview metadata is missing for joint ' + jointName);
  }

  var joint = _mjJointMap[jointName];
  if (!joint.node || joint.node.isObject3D !== true) {
    throw new Error('Joint preview node is invalid for joint ' + jointName);
  }
  if (!joint.axis || joint.axis.isVector3 !== true) {
    throw new Error('Joint preview axis is invalid for joint ' + jointName);
  }
  if (!joint.restPosition || joint.restPosition.isVector3 !== true) {
    throw new Error('Joint restPosition is invalid for joint ' + jointName);
  }
  if (!joint.restQuaternion || joint.restQuaternion.isQuaternion !== true) {
    throw new Error('Joint restQuaternion is invalid for joint ' + jointName);
  }
  if (!joint.bodyLocalOriginOffset || joint.bodyLocalOriginOffset.isVector3 !== true) {
    throw new Error('Joint bodyLocalOriginOffset is invalid for joint ' + jointName);
  }

  return joint;
}

function updateJointSliderValueLabel(jointName, value) {
  if (!Object.prototype.hasOwnProperty.call(_jointSliderMap, jointName)) {
    throw new Error('Joint slider label is missing for joint ' + jointName);
  }

  var joint = getJointPreviewEntry(jointName);
  _jointSliderMap[jointName].valueLabel.textContent = formatJointValueLabel(joint.type, value);
}

function formatJointValueLabel(jointType, value) {
  if (jointType === 'hinge') {
    return value.toFixed(3) + ' rad / ' + radiansToDegrees(value).toFixed(1) + ' deg';
  }
  if (jointType === 'slide') {
    return formatMillimeters(value) + ' / ' + value.toFixed(6) + ' m';
  }
  throw new Error('Unsupported joint value label type: ' + String(jointType));
}

function formatJointRangeLabel(jointType, minValue, maxValue) {
  if (jointType === 'hinge') {
    return (
      'Range: ' + minValue.toFixed(3) + ' to ' + maxValue.toFixed(3) + ' rad' +
      ' (' + radiansToDegrees(minValue).toFixed(1) + ' to ' + radiansToDegrees(maxValue).toFixed(1) + ' deg)'
    );
  }
  if (jointType === 'slide') {
    return (
      'Range: ' + formatMillimeters(minValue) + ' to ' + formatMillimeters(maxValue) +
      ' (' + minValue.toFixed(6) + ' to ' + maxValue.toFixed(6) + ' m)'
    );
  }
  throw new Error('Unsupported joint range label type: ' + String(jointType));
}

function formatMillimeters(valueMeters) {
  var mm = Number(valueMeters) * 1000;
  if (!Number.isFinite(mm)) {
    return String(valueMeters) + ' m';
  }
  var abs = Math.abs(mm);
  var digits = abs >= 10 ? 1 : (abs >= 1 ? 2 : 3);
  return mm.toFixed(digits) + ' mm';
}

function slideSliderStep(range) {
  if (!Array.isArray(range) || range.length !== 2) {
    return '0.001';
  }
  var span = Math.abs(Number(range[1]) - Number(range[0]));
  if (!Number.isFinite(span) || span <= 0) {
    return '0.0001';
  }
  return String(Math.max(span / 200, 0.00001));
}

function radiansToDegrees(value) {
  if (Number.isFinite(value) === false) {
    throw new Error('Cannot convert non-finite radians value to degrees');
  }
  return value * 180 / Math.PI;
}

function resetJointPanelState() {
  var panel = document.getElementById('joint-panel');
  var panelBody = document.getElementById('joint-panel-body');
  panel.hidden = true;
  panelBody.innerHTML = '';
  _jointSliderMap = Object.create(null);
  _jointBodyListItemMap = Object.create(null);
}

function updateJointBodyListSelection() {
  Object.keys(_jointBodyListItemMap).forEach(function(bodyName) {
    _jointBodyListItemMap[bodyName].classList.toggle('selected', bodyName === _selectedBodyName);
  });
}

function resetSceneState() {
  stopTransformEditing();
  _mjJointMap = Object.create(null);
  _mjBodyMap = Object.create(null);
  _selectedBodyName = null;
  _materialOwnerIds = Object.create(null);
  resetJointPanelState();
  updateSelectedBodyLabel();
}

function autoFrameRootGroup(group) {
  var box = new THREE.Box3().setFromObject(group);
  if (box.isEmpty()) {
    return;
  }

  var center = new THREE.Vector3();
  box.getCenter(center);
  var size = box.getSize(new THREE.Vector3());
  var maxDim = Math.max(size.x, size.y, size.z);
  var dist = maxDim * 2.0;

  camera.position.set(
    center.x + dist * 0.5,
    center.y + dist * 0.4,
    center.z + dist * 0.5
  );
  controls.target.copy(center);
  controls.update();
}

function captureCameraState() {
  return {
    position: camera.position.clone(),
    target: controls.target.clone()
  };
}

function restoreCameraState(cameraState) {
  camera.position.copy(cameraState.position);
  controls.target.copy(cameraState.target);
  controls.update();
}

// ============================================================
// Drag-Drop XML Reload
// ============================================================
(function initDragDrop() {
  var dropZone = document.getElementById('drop-zone');
  var dragCounter = 0;

  document.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
  });

  document.addEventListener('dragenter', function(e) {
    e.preventDefault();
    dragCounter++;
    dropZone.classList.add('visible');
  });

  document.addEventListener('dragleave', function(e) {
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      dropZone.classList.remove('visible');
    }
  });

  document.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    dragCounter = 0;
    dropZone.classList.remove('visible');

    if (!assetName) {
      showError('Select an asset first before dropping XML');
      return;
    }

    var file = e.dataTransfer.files[0];
    if (!file) return;

    var ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'xml' && ext !== 'mjcf') {
      showError('Only .xml or .mjcf files are supported');
      return;
    }

    uploadAndReload(file);
  });

  // File input path
  var fileInput = document.getElementById('file-input');
  fileInput.addEventListener('change', function(e) {
    if (e.target.files.length > 0 && assetName) {
      uploadAndReload(e.target.files[0]);
      fileInput.value = ''; // reset
    }
  });
})();

function uploadAndReload(file) {
  showStatus('Uploading ' + file.name + '...');
  hideError();

  var formData = new FormData();
  formData.append('file', file);

  fetch('/api/assets/' + encodeURIComponent(assetName) + '/preview-from-xml', {
    method: 'POST',
    body: formData
  })
    .then(function(r) { return r.json(); })
    .then(function(manifest) {
      if (manifest.status !== 'ok') {
        showError('XML reload error: ' + String(manifest.message));
        return;
      }
      return loadManifestIntoDraftAndBuildScene(manifest, { preserveCamera: true, preserveSelection: true });
    })
    .catch(function(err) {
      showError('Upload failed: ' + err);
    });
}

// ============================================================
// UI Helpers
// ============================================================
function showStatus(msg) {
  document.getElementById('status-text').textContent = msg;
}

function showError(msg) {
  var bar = document.getElementById('error-bar');
  bar.textContent = msg;
  bar.style.display = 'block';
  setTimeout(function() { bar.style.display = 'none'; }, 8000);
}

function hideError() {
  document.getElementById('error-bar').style.display = 'none';
}

function disposeGroup(group) {
  group.traverse(function(child) {
    if (child.geometry) {
      child.geometry.dispose();
    }
    if (child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(disposeMaterial);
        return;
      }
      disposeMaterial(child.material);
    }
  });
}

function disposeMaterial(material) {
  if (material.map) {
    material.map.dispose();
  }
  material.dispose();
}
