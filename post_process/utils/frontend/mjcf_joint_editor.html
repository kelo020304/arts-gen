<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJCF Joint Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #222; font-family: 'Segoe UI', Arial, sans-serif; }
  #viewer-canvas { display: block; width: 100vw; height: 100vh; }

  #toolbar {
    position: fixed; top: 12px; left: 12px; z-index: 100;
    background: rgba(30,30,46,0.92); border-radius: 8px; padding: 10px 16px;
    color: #ddd; font-size: 13px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  #toolbar select {
    background: #2a2a3e; color: #eee; border: 1px solid #555; border-radius: 4px;
    padding: 4px 8px; font-size: 13px; cursor: pointer;
  }
  #toolbar button {
    background: #2e7d32; color: #fff; border: 1px solid rgba(255,255,255,0.16);
    border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  #toolbar button:disabled {
    opacity: 0.55; cursor: not-allowed;
  }
  #status-text { color: #aaa; font-size: 12px; }
  #save-status-text { color: #8ff0b4; font-size: 12px; }
  #export-status-text { color: #8dc7ff; font-size: 12px; }
  #export-status-text.error { color: #ff9a9a; }
  #selected-body-text { color: #ffd27a; font-size: 12px; }

  #joint-panel {
    position: fixed; top: 76px; right: 12px; bottom: 12px; z-index: 110;
    width: 320px; display: flex; flex-direction: column;
    background: rgba(18,18,28,0.94); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    color: #ddd; overflow: hidden; backdrop-filter: blur(6px);
  }
  #joint-panel[hidden] { display: none; }
  #joint-panel-header {
    padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 14px; font-weight: 700; color: #fff;
    letter-spacing: 0.02em;
  }
  #joint-panel-body {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .panel-section {
    display: flex; flex-direction: column; gap: 10px;
  }
  .panel-section-title {
    color: #8e90aa; font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0 2px;
  }
  #joint-panel-empty {
    padding: 14px; border-radius: 10px; background: rgba(255,255,255,0.04);
    color: #aaa; font-size: 12px; line-height: 1.5;
  }
  #joint-body-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .joint-body-row {
    display: flex; align-items: stretch; gap: 8px;
  }
  .joint-body-merge-toggle {
    flex: 0 0 auto; align-self: center; width: 16px; height: 16px; cursor: pointer;
    accent-color: #ffb000;
  }
  .joint-body-button {
    width: 100%; padding: 11px 12px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.05); color: #ddd; cursor: pointer;
    text-align: left; transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
  }
  .joint-body-button:hover {
    border-color: rgba(255,210,122,0.32);
    background: rgba(255,210,122,0.08);
    transform: translateY(-1px);
  }
  .joint-body-button.selected {
    border-color: rgba(255,176,0,0.48);
    background: rgba(255,176,0,0.14);
    box-shadow: inset 0 0 0 1px rgba(255,176,0,0.16);
  }
  .joint-body-name {
    color: #fff; font-size: 13px; font-weight: 600;
    line-height: 1.4;
  }
  .joint-body-meta {
    margin-top: 4px; color: #8e90aa; font-size: 11px; line-height: 1.4;
  }
  .joint-slider-row {
    padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .joint-slider-top {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    margin-bottom: 8px;
  }
  .joint-slider-title {
    display: flex; align-items: center; gap: 8px; min-width: 0;
  }
  .joint-slider-name {
    color: #fff; font-size: 13px; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .joint-type-badge {
    padding: 2px 7px; border-radius: 999px; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.06em;
    border: 1px solid transparent;
  }
  .joint-type-badge.hinge {
    color: #ffd27a; background: rgba(255,210,122,0.12); border-color: rgba(255,210,122,0.26);
  }
  .joint-type-badge.slide {
    color: #7ad8ff; background: rgba(122,216,255,0.12); border-color: rgba(122,216,255,0.26);
  }
  .joint-slider-value {
    color: #8ff0b4; font-size: 11px; line-height: 1.4; text-align: right;
    min-width: 108px;
  }
  .joint-slider-range {
    margin-bottom: 8px; color: #8e90aa; font-size: 11px; line-height: 1.4;
  }
  .joint-slider {
    width: 100%; appearance: none; -webkit-appearance: none;
    height: 6px; border-radius: 999px; outline: none; cursor: pointer;
    background: linear-gradient(90deg, #2f3148 0%, #494d6d 100%);
  }
  .joint-slider::-webkit-slider-thumb {
    width: 16px; height: 16px; border-radius: 50%; -webkit-appearance: none;
    background: #f5f7ff; border: 2px solid #2e7d32; box-shadow: 0 0 0 3px rgba(46,125,50,0.18);
  }
  .joint-slider::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: #f5f7ff; border: 2px solid #2e7d32; box-shadow: 0 0 0 3px rgba(46,125,50,0.18);
  }
  .joint-editor-card {
    padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; gap: 10px;
  }
  .joint-editor-copy {
    color: #aaa; font-size: 12px; line-height: 1.5;
  }
  .joint-editor-selected {
    color: #fff; font-size: 13px; font-weight: 600;
  }
  .joint-editor-grid {
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px;
  }
  .joint-editor-field {
    display: flex; flex-direction: column; gap: 5px;
  }
  .joint-editor-field.full {
    grid-column: 1 / -1;
  }
  .joint-editor-field label {
    color: #8e90aa; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .joint-editor-field input,
  .joint-editor-field select {
    width: 100%; background: #1f2133; color: #eef1ff; border: 1px solid #444963;
    border-radius: 6px; padding: 6px 8px; font-size: 12px;
  }
  .joint-editor-actions {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .joint-editor-actions button {
    padding: 7px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.08); color: #f3f5ff; font-size: 12px; font-weight: 600;
    cursor: pointer;
  }
  .joint-editor-actions button.active {
    background: rgba(255,176,0,0.18);
    border-color: rgba(255,176,0,0.4);
    color: #ffd27a;
  }
  .joint-editor-actions button:disabled {
    opacity: 0.5; cursor: not-allowed;
  }

  @media (max-width: 900px) {
    #joint-panel {
      top: auto; left: 12px; right: 12px; bottom: 12px; width: auto; max-height: 42vh;
    }
  }

  #drop-zone {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 200;
    background: rgba(20,20,40,0.85); display: none; align-items: center; justify-content: center;
    border: 4px dashed #6c5ce7; pointer-events: none;
  }
  #drop-zone.visible { display: flex; }
  #drop-zone span {
    color: #fff; font-size: 22px; font-weight: bold;
    background: rgba(108,92,231,0.3); padding: 24px 40px; border-radius: 12px;
  }

  #error-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 150;
    background: rgba(200,40,40,0.9); color: #fff; padding: 8px 20px; border-radius: 6px;
    font-size: 13px; display: none; max-width: 80vw;
  }

  #kinematic-agent-panel {
    position: fixed; top: 76px; left: 12px; z-index: 120;
    width: 390px; max-height: calc(100vh - 96px); overflow: hidden;
    display: flex; flex-direction: column; gap: 10px;
    background: rgba(18,18,28,0.94); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px; color: #e7e9f4; box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    padding: 12px; backdrop-filter: blur(6px);
  }
  #kinematic-agent-panel[hidden] { display: none; }
  .kinematic-agent-header {
    display: flex; justify-content: space-between; gap: 10px; align-items: flex-start;
    border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px;
  }
  .kinematic-agent-title { font-size: 14px; font-weight: 800; color: #fff; }
  .kinematic-agent-sub { margin-top: 3px; color: #9aa0b7; font-size: 11px; line-height: 1.35; }
  .kinematic-agent-badge {
    flex: 0 0 auto; padding: 3px 8px; border-radius: 999px;
    font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
    border: 1px solid rgba(141,199,255,0.28); color: #8dc7ff; background: rgba(141,199,255,0.10);
  }
  .kinematic-agent-body {
    overflow: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 2px;
  }
  .kinematic-agent-grid {
    display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px;
  }
  .kinematic-agent-progress {
    display: flex; flex-direction: column; gap: 6px;
  }
  .kinematic-agent-progress-track {
    height: 8px; overflow: hidden; border-radius: 999px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.08);
  }
  #kinematic-agent-progress-fill {
    display: block; height: 100%; width: 0%;
    border-radius: inherit; background: linear-gradient(90deg, #8ff0b4, #8dc7ff);
    transition: width 120ms linear;
  }
  .kinematic-agent-progress-meta {
    display: flex; justify-content: space-between; gap: 8px;
    color: #9aa0b7; font-size: 10px; line-height: 1.25;
  }
  .kinematic-agent-stat {
    min-height: 52px; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
    padding: 8px; background: rgba(255,255,255,0.04);
  }
  .kinematic-agent-label {
    color: #8e90aa; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .kinematic-agent-value {
    margin-top: 5px; color: #fff; font-size: 12px; font-weight: 700;
    overflow-wrap: anywhere;
  }
  .kinematic-agent-section-title {
    color: #8e90aa; font-size: 10px; font-weight: 800;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  #kinematic-agent-estimates,
  #kinematic-agent-signals {
    display: flex; flex-direction: column; gap: 6px;
  }
  .kinematic-agent-row {
    border: 1px solid rgba(255,255,255,0.08); border-left: 4px solid rgba(141,199,255,0.8);
    border-radius: 8px; background: rgba(255,255,255,0.04); padding: 8px;
    font-size: 11px; line-height: 1.35;
  }
  .kinematic-agent-row.error { border-left-color: #ff8a80; }
  .kinematic-agent-row.warning { border-left-color: #ffd27a; }
  .kinematic-agent-row.note { border-left-color: #8ff0b4; }
  .kinematic-agent-diagnostics-head {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  #kinematic-agent-copy-diagnostics {
    flex: 0 0 auto; border: 1px solid rgba(141,199,255,0.35);
    background: rgba(141,199,255,0.12); color: #dce7ff;
    border-radius: 6px; padding: 4px 8px; font-size: 10px; font-weight: 800;
    cursor: pointer;
  }
  #kinematic-agent-copy-diagnostics:hover {
    background: rgba(141,199,255,0.20);
  }
  #kinematic-agent-diagnostics-copy {
    width: 100%; min-height: 74px; max-height: 130px; resize: vertical;
    box-sizing: border-box; margin-top: 6px; color: #dce7ff;
    background: rgba(5,7,12,0.75); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 8px; font: 10px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  #kinematic-agent-code {
    margin: 0; max-height: 180px; overflow: auto; white-space: pre-wrap;
    color: #dce7ff; background: rgba(5,7,12,0.75);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
    padding: 10px; font-size: 10px; line-height: 1.45;
  }
  body.kinematic-agent-mode #asset-picker,
  body.kinematic-agent-mode #save-xml-button,
  body.kinematic-agent-mode #export-usd-button,
  body.kinematic-agent-mode #save-status-text,
  body.kinematic-agent-mode #export-status-text {
    display: none;
  }
</style>

<script src="/shared_libs/three.min.js"></script>
<script src="/shared_libs/OBJLoader.js"></script>
<script src="/shared_libs/OrbitControls.js"></script>
<script src="/shared_libs/BufferGeometryUtils.js"></script>
<script src="/shared_libs/TransformControls.js"></script>
</head>
<body>

<canvas id="viewer-canvas"></canvas>

<div id="toolbar">
  <label for="asset-picker" style="font-weight:bold;">Asset:</label>
  <select id="asset-picker"><option value="">-- select --</option></select>
  <button type="button" id="save-xml-button">Save XML</button>
  <button type="button" id="export-usd-button">Isaac Sim 启动中...</button>
  <span id="save-status-text">Saved</span>
  <span id="export-status-text">Isaac Sim 启动中...</span>
  <span id="status-text">Loading...</span>
  <span id="selected-body-text">Selected: none</span>
</div>

<aside id="kinematic-agent-panel" hidden>
  <div class="kinematic-agent-header">
    <div>
      <div class="kinematic-agent-title">Kinematic Agent</div>
      <div class="kinematic-agent-sub" id="kinematic-agent-run-label">waiting for run</div>
    </div>
    <div class="kinematic-agent-badge" id="kinematic-agent-badge">live</div>
  </div>
  <div class="kinematic-agent-body">
    <div class="kinematic-agent-grid">
      <div class="kinematic-agent-stat">
        <div class="kinematic-agent-label">Iteration</div>
        <div class="kinematic-agent-value" id="kinematic-agent-iteration">0</div>
      </div>
      <div class="kinematic-agent-stat">
        <div class="kinematic-agent-label">Phase</div>
        <div class="kinematic-agent-value" id="kinematic-agent-phase">idle</div>
      </div>
      <div class="kinematic-agent-stat">
        <div class="kinematic-agent-label">Playback</div>
        <div class="kinematic-agent-value" id="kinematic-agent-playback">waiting</div>
      </div>
    </div>
    <div class="kinematic-agent-progress">
      <div class="kinematic-agent-progress-track" aria-label="Agent iteration progress">
        <span id="kinematic-agent-progress-fill"></span>
      </div>
      <div class="kinematic-agent-progress-meta">
        <span id="kinematic-agent-progress-label">waiting for asset</span>
        <span id="kinematic-agent-progress-value">0%</span>
      </div>
    </div>
    <div>
      <div class="kinematic-agent-section-title">Estimates</div>
      <div id="kinematic-agent-estimates"></div>
    </div>
    <div>
      <div class="kinematic-agent-section-title">Warning / Note / Error</div>
      <div id="kinematic-agent-signals"></div>
    </div>
    <div>
      <div class="kinematic-agent-diagnostics-head">
        <div class="kinematic-agent-section-title">Diagnostics</div>
        <button id="kinematic-agent-copy-diagnostics" type="button">Copy</button>
      </div>
      <textarea id="kinematic-agent-diagnostics-copy" readonly spellcheck="false">waiting for diagnostics</textarea>
    </div>
    <div>
      <div class="kinematic-agent-section-title">estimate_limit.py update</div>
      <pre id="kinematic-agent-code">waiting for agent edit</pre>
    </div>
  </div>
</aside>

<aside id="joint-panel" hidden>
  <div id="joint-panel-header">Bodies &amp; Joints</div>
  <div id="joint-panel-body"></div>
</aside>

<div id="drop-zone"><span>Drop MJCF XML here to reload</span></div>
<div id="error-bar"></div>
<input type="file" id="file-input" accept=".xml,.mjcf" style="display:none;">

<script>
// ============================================================
// State
// ============================================================
var assetName = '';
var kinematicAgentRunId = '';
var scene, camera, renderer, controls;
var rootGroup = null;
var _workbenchGlobalOrientationDegrees = { roll: 0, pitch: 0, yaw: 0 };
var _mjJointMap = Object.create(null);
var _mjBodyMap = Object.create(null);
var _selectedBodyName = null;
var _materialOwnerIds = Object.create(null);
var _jointSliderMap = Object.create(null);
var _jointBodyListItemMap = Object.create(null);
var _selectionEmissiveColor = new THREE.Color(0xffb000);
var _draftManifest = null;
var _anchorDragRaycaster = new THREE.Raycaster();
var _kinematicAgentState = {
  enabled: false,
  pollTimerId: null,
  loadedIteration: null,
  loadedAssetName: null,
  latestState: null,
  playbackManifest: null,
  playbackJoints: [],
  playbackStartMs: 0,
  playbackFrameId: null,
  activeJointName: null,
  runtimeError: null
};
var _uiState = {
  isDirty: false,
  saveStatus: 'Saved',
  isaacReady: false,
  isaacStatus: 'Isaac Sim 启动中...',
  isaacStatusPollTimerId: null,
  isExporting: false,
  exportStatusText: '',
  exportStatusIsError: false,
  mergeSelection: new Set(),
  lastMergeSnapshot: null,
  activeJointEditMode: null,
  activeJointName: null,
  activeJointSnapshot: null,
  activeJointTempType: null,
  activeJointTempRange: null,
  activeJointTempAnchor: null,
  activeJointTempAxis: null,
  activeJointHandle: null,
  jointTransformAxisFilter: 'all',
  activeAnchorDrag: null,
  activeBodyEditMode: null,
  activeBodyName: null,
  activeBodyHandle: null,
  transformControls: null
};

// Extract asset name or kinematic run id from URL.
(function() {
  var agentParts = window.location.pathname.split('/kinematic-agent/');
  if (agentParts.length > 1 && agentParts[1]) {
    kinematicAgentRunId = decodeURIComponent(agentParts[1].replace(/\/+$/, ''));
    _kinematicAgentState.enabled = true;
    document.body.classList.add('kinematic-agent-mode');
    return;
  }
  var assetParts = window.location.pathname.split('/object-post-process/');
  if (assetParts.length > 1 && assetParts[1]) {
    assetName = decodeURIComponent(assetParts[1].replace(/\/+$/, ''));
  }
})();

// ============================================================
// Three.js Initialization
// ============================================================
(function initViewer() {
  var canvas = document.getElementById('viewer-canvas');

  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.001, 100);
  camera.up.set(0, 0, 1);  // Z-up (MuJoCo convention)
  camera.position.set(1.5, -1.0, 1.0);

  controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.12;

  // Lights
  var ambLight = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambLight);
  var dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight1.position.set(2, 3, 2);
  scene.add(dirLight1);
  var dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
  dirLight2.position.set(-1, 1, -1);
  scene.add(dirLight2);

  // Grid helper (XY plane for Z-up)
  var grid = new THREE.GridHelper(2, 20, 0x999999, 0xcccccc);
  grid.rotation.x = Math.PI / 2;  // rotate from XZ to XY plane
  scene.add(grid);

  // --- Axes indicator (bottom-right corner) ---
  var axesScene = new THREE.Scene();
  var axesCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 10);
  axesCamera.up.set(0, 0, 1);  // Z-up, match main camera
  axesCamera.position.set(0, -2.5, 0);
  axesCamera.lookAt(0, 0, 0);

  // RGB axes: X=red, Y=green, Z=blue
  var axesHelper = new THREE.AxesHelper(1);
  axesScene.add(axesHelper);

  // Axis labels
  function makeLabel(text, color, pos) {
    var c = document.createElement('canvas');
    c.width = 64; c.height = 64;
    var ctx = c.getContext('2d');
    ctx.font = 'bold 48px Arial';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 32, 32);
    var tex = new THREE.CanvasTexture(c);
    var mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
    var sprite = new THREE.Sprite(mat);
    sprite.position.copy(pos);
    sprite.scale.set(0.3, 0.3, 1);
    return sprite;
  }
  axesScene.add(makeLabel('X', '#ff4444', new THREE.Vector3(1.3, 0, 0)));
  axesScene.add(makeLabel('Y', '#44ff44', new THREE.Vector3(0, 1.3, 0)));
  axesScene.add(makeLabel('Z', '#4488ff', new THREE.Vector3(0, 0, 1.3)));

  // Render loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Main scene
    renderer.render(scene, camera);

    // Axes indicator — sync rotation with main camera (Z-up)
    axesCamera.up.set(0, 0, 1);
    axesCamera.quaternion.copy(camera.quaternion);
    axesCamera.position.set(0, 0, 2.5).applyQuaternion(camera.quaternion);
    axesCamera.lookAt(0, 0, 0);

    var axesSize = 150;
    var w = renderer.domElement.width;
    var h = renderer.domElement.height;
    renderer.setViewport(0, 0, axesSize, axesSize);
    renderer.setScissor(0, 0, axesSize, axesSize);
    renderer.setScissorTest(true);
    renderer.autoClear = false;
    renderer.clearDepth();
    renderer.render(axesScene, axesCamera);
    renderer.autoClear = true;
    renderer.setScissorTest(false);
    renderer.setViewport(0, 0, w, h);
  }
  animate();

  // Resize
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();

(function initJointTransformControls() {
  var transformControls = new THREE.TransformControls(camera, renderer.domElement);
  transformControls.setSize(1.15);
  transformControls.visible = false;
  function syncActiveJointEditPreviewFromHandle() {
    if (_uiState.activeJointEditMode === null) {
      return;
    }
    try {
      updateTemporaryJointEditFromHandle();
    } catch (err) {
      showError(String(err && err.message ? err.message : err));
    }
  }
  transformControls.addEventListener('dragging-changed', function(event) {
    controls.enabled = !event.value;
    if (event.value === false) {
      try {
        if (_uiState.activeBodyEditMode !== null) {
          commitActiveEditHandle();
        }
      } catch (err) {
        showError(String(err && err.message ? err.message : err));
      }
    }
  });
  transformControls.addEventListener('objectChange', function() {
    if (_uiState.activeJointEditMode !== 'axis') {
      return;
    }
    syncActiveJointEditPreviewFromHandle();
  });
  scene.add(transformControls);
  _uiState.transformControls = transformControls;
})();

(function initAnchorDragInteractions() {
  var domElement = renderer.domElement;

  domElement.addEventListener('pointerdown', function(event) {
    try {
      beginAnchorPointerDrag(event);
    } catch (err) {
      showError(String(err && err.message ? err.message : err));
    }
  });

  window.addEventListener('pointermove', function(event) {
    try {
      updateAnchorPointerDrag(event);
    } catch (err) {
      showError(String(err && err.message ? err.message : err));
    }
  });

  window.addEventListener('pointerup', function(event) {
    stopAnchorPointerDrag(event.pointerId);
  });

  window.addEventListener('pointercancel', function(event) {
    stopAnchorPointerDrag(event.pointerId);
  });
})();

// ============================================================
// Asset Picker
// ============================================================
(function initAssetPicker() {
  var picker = document.getElementById('asset-picker');
  var saveButton = document.getElementById('save-xml-button');
  var exportButton = document.getElementById('export-usd-button');

  if (_kinematicAgentState.enabled) {
    picker.disabled = true;
    saveButton.disabled = true;
    exportButton.disabled = true;
    return;
  }

  fetch('/api/assets')
    .then(function(r) { return r.json(); })
    .then(function(assets) {

      window.location.href = '/object-post-process/' + encodeURIComponent(selected);

      handleSaveXml();

    }
  });
  exportButton.addEventListener('click', function() {
    try {
      handleExportUsd();
    } catch (err) {
      setExportStatus('Export failed', true);
      showError('Export failed: ' + String(err && err.message ? err.message : err));
    }
