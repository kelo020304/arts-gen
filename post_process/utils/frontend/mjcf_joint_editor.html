(function initIsaacStatusPolling() {
  if (_kinematicAgentState.enabled) {
    return;
  }
  pollIsaacStatus();
})();

// ============================================================
// Load Manifest & Build Scene
// ============================================================
if (_kinematicAgentState.enabled) {
  initKinematicAgentMode();
} else if (assetName) {
  showStatus('Loading ' + assetName + '...');
  fetch('/api/assets/' + encodeURIComponent(assetName) + '/preview-manifest')
    .then(function(r) { return r.json(); })
    .then(function(manifest) {
      if (manifest.status !== 'ok') {
        showError('Manifest error: ' + String(manifest.message));
        return;
      }
      return loadManifestIntoDraftAndBuildScene(manifest, { preserveCamera: false, preserveSelection: false });
    })
    .catch(function(err) {
      showError('Failed to load manifest: ' + err);
    });
} else {
  showStatus('Select an asset to begin');
}

function initKinematicAgentMode() {
  var panel = document.getElementById('kinematic-agent-panel');
  if (panel) {
    panel.hidden = false;
  }
  var copyButton = document.getElementById('kinematic-agent-copy-diagnostics');
  if (copyButton) {
    copyButton.addEventListener('click', copyKinematicDiagnostics);
  }
  document.getElementById('kinematic-agent-run-label').textContent = kinematicAgentRunId;
  showStatus('Kinematic agent live: ' + kinematicAgentRunId);
  pollKinematicAgentState();
}

function scheduleKinematicAgentPoll(delayMs) {
  if (!_kinematicAgentState.enabled) {
    return;
  }
  if (_kinematicAgentState.pollTimerId !== null) {
    window.clearTimeout(_kinematicAgentState.pollTimerId);
  }
  _kinematicAgentState.pollTimerId = window.setTimeout(function() {
    _kinematicAgentState.pollTimerId = null;
    pollKinematicAgentState();
  }, delayMs);
}

function pollKinematicAgentState() {
  if (!_kinematicAgentState.enabled) {
    return;
  }
  fetch('/api/kinematic-agent/' + encodeURIComponent(kinematicAgentRunId) + '/state?t=' + Date.now(), {
    cache: 'no-store'
  })
    .then(function(response) { return response.json(); })
    .then(function(state) {
      _kinematicAgentState.latestState = state;
      renderKinematicAgentPanel(state);
      applyKinematicAgentOrientation(state);
      if (isKinematicRunFinishedPassed(state)) {
        stopKinematicPlaybackAtManualState('manual sliders ready');
      }
      var latestIteration = Number(state.latest_iteration || 0);
      var latestPreview = state.latest_preview || {};
      var latestAssetName = typeof latestPreview.asset_name === 'string' ? latestPreview.asset_name : '';
      if (latestAssetName && latestAssetName !== _kinematicAgentState.loadedAssetName) {
        return loadKinematicAgentManifest(latestIteration, latestAssetName);
      }
    })
    .catch(function(err) {
      var message = String(err && err.message ? err.message : err);
      _kinematicAgentState.runtimeError = message;
      renderKinematicAgentError(message);
    })
    .then(function() {
      scheduleKinematicAgentPoll(500);
    });
}

function applyKinematicAgentOrientation(state) {
  if (!state || typeof state !== 'object') {
    return;
  }
  var latestPreview = state.latest_preview || {};
  var orientation = latestPreview.orientation_degrees || state.orientation_degrees;
  if (!orientation || typeof orientation !== 'object') {
    return;
  }
  setWorkbenchGlobalOrientation(orientation);
}

function loadKinematicAgentManifest(iteration, assetNameForPreview) {
  return fetch('/api/kinematic-agent/' + encodeURIComponent(kinematicAgentRunId) + '/manifest?t=' + Date.now(), {
    cache: 'no-store'
  })
    .then(function(response) { return response.json(); })
    .then(function(manifest) {
      if (manifest.status !== 'ok') {
        throw new Error('Manifest error: ' + String(manifest.message || 'unknown'));
      }
      return loadManifestIntoDraftAndBuildScene(manifest, {
        preserveCamera: _kinematicAgentState.loadedAssetName !== null,
        preserveSelection: false
      }).then(function() {
        _kinematicAgentState.loadedIteration = iteration;
        _kinematicAgentState.loadedAssetName = assetNameForPreview || null;
        _kinematicAgentState.runtimeError = null;
        var latestPreview = (_kinematicAgentState.latestState || {}).latest_preview || {};
        startKinematicFullRangePlayback(manifest, latestPreview);
      });
    });
}

function renderKinematicAgentPanel(state) {
  var latestEvent = state.latest_event || {};
  var latestPreview = state.latest_preview || {};
  document.getElementById('kinematic-agent-iteration').textContent = String(state.latest_iteration || latestEvent.iteration || 0);
  document.getElementById('kinematic-agent-phase').textContent = latestEvent.phase || latestEvent.event || 'waiting';
  document.getElementById('kinematic-agent-playback').textContent =
    latestPreview.playback ? latestPreview.playback.mode : 'waiting';
  document.getElementById('kinematic-agent-badge').textContent = latestEvent.status || 'live';
  renderKinematicProgress(state);

  var estimates = Array.isArray(latestPreview.estimates) ? latestPreview.estimates : [];
  var jointStates = latestPreview.joint_states || {};
  document.getElementById('kinematic-agent-estimates').innerHTML = estimates.length
    ? estimates.map(function(est) {
      var axis = est.axis_label || (Array.isArray(est.axis_world) ? est.axis_world.join(',') : '');
      var state = jointStates[est.joint_name] || {};
      var jointType = (latestPreview.joint_types || {})[est.joint_name] || '';
      var status = state.status ? ' ' + state.status : '';
      return '<div class="kinematic-agent-row">' +
        '<strong>' + escapeHtml(est.joint_name || '-') + '</strong> ' +
        escapeHtml(axis) + ' ' + escapeHtml(formatKinematicEstimateRange(jointType, est.lower, est.upper)) +
        escapeHtml(status) +
        '</div>';
    }).join('')
    : '<div class="kinematic-agent-row note">waiting for first estimate</div>';

  var signals = collectKinematicSignals(state);
  document.getElementById('kinematic-agent-signals').innerHTML = signals.length
    ? signals.map(function(signal) {
      return '<div class="kinematic-agent-row ' + signal.kind + '">' +
        '<strong>' + escapeHtml(signal.kind) + '</strong> ' + escapeHtml(signal.text) +
        '</div>';
    }).join('')
    : '<div class="kinematic-agent-row note">no warning or error</div>';
  renderKinematicDiagnostics(state, signals, _kinematicAgentState.runtimeError);

  var codeEvent = latestKinematicEventWith(function(event) {
    return event.details && (event.details.editable_diff || event.details.editable_code);
  }, state);
  var codeText = codeEvent && codeEvent.details
    ? (codeEvent.details.editable_diff || codeEvent.details.editable_code)
    : 'waiting for agent edit';
  document.getElementById('kinematic-agent-code').textContent = codeText;
}

function renderKinematicProgress(state) {
  var latestEvent = state.latest_event || {};
  var latestPreview = state.latest_preview || {};
  var maxIterations = kinematicMaxAgentIterations(state);
  var eventIteration = Number(latestEvent.iteration || 0);
  var previewIteration = Number(state.latest_iteration || 0);
  var activeIteration = Math.max(eventIteration, previewIteration, 0);
  if (maxIterations > 0) {
    var iterationProgress = Math.max(0, Math.min(activeIteration / maxIterations, 1));
    var label = 'iteration ' + activeIteration + ' / ' + maxIterations;
    if (latestEvent.phase || latestEvent.event) {
      label += ' ' + (latestEvent.phase || latestEvent.event);
    }
    if (latestEvent.event === 'api_waiting') {
      label += ' waiting API';
    }
    setKinematicProgress(iterationProgress, label);
    return;
  }
  if (latestEvent.event === 'api_waiting' && latestEvent.details) {
    setKinematicProgress(0, 'iteration ' + activeIteration + ' waiting API');
    return;
  }
  if (latestPreview.preview_kind === 'rest') {
    setKinematicProgress(0, 'asset loaded, limits unknown');
    return;
  }
  if (latestPreview.asset_name && _kinematicAgentState.playbackFrameId === null) {
    setKinematicProgress(0, 'candidate asset loaded');
    return;
  }
  if (!latestPreview.asset_name) {
    setKinematicProgress(0, 'building initial asset');
  }
}

function kinematicMaxAgentIterations(state) {
  var events = Array.isArray(state.events) ? state.events : [];
  for (var i = events.length - 1; i >= 0; i--) {
    var details = events[i] && events[i].details;
    if (!details) {
      continue;
    }
    var value = Number(details.max_agent_iterations || details.max_iterations || 0);
    if (value > 0) {
      return value;
    }
  }
  return 0;
}

function renderKinematicAgentError(message) {
  document.getElementById('kinematic-agent-signals').innerHTML =
    '<div class="kinematic-agent-row error"><strong>error</strong> ' + escapeHtml(message) + '</div>';
  var state = _kinematicAgentState.latestState || {};
  renderKinematicDiagnostics(state, [{ kind: 'error', text: String(message) }], message);
}

function renderKinematicDiagnostics(state, signals, runtimeError) {
  var box = document.getElementById('kinematic-agent-diagnostics-copy');
  if (!box) {
    return;
  }
  var latestEvent = (state && state.latest_event) || {};
  var latestPreview = (state && state.latest_preview) || {};
  var lines = [
    'run_id=' + String(kinematicAgentRunId || '-'),
    'status=' + String((latestEvent && latestEvent.status) || (state && state.status) || '-'),
    'iteration=' + String((state && state.latest_iteration) || (latestEvent && latestEvent.iteration) || 0),
    'phase=' + String((latestEvent && latestEvent.phase) || (latestEvent && latestEvent.event) || '-'),
    'playback=' + String((latestPreview.playback && latestPreview.playback.mode) || '-'),
    'asset=' + String(latestPreview.asset_name || '-')
  ];
  if (runtimeError) {
    lines.push('runtime_error=' + String(runtimeError));
  }
  if (Array.isArray(signals) && signals.length) {
    lines.push('signals:');
    signals.forEach(function(signal) {
      lines.push('- ' + signal.kind + ': ' + signal.text);
    });
  }
  if (latestEvent && latestEvent.details) {
    try {
      lines.push('latest_event_details=' + JSON.stringify(latestEvent.details));
    } catch (_err) {
      lines.push('latest_event_details=<unserializable>');
    }
  }
  box.value = lines.join('\n');
}

function copyKinematicDiagnostics() {
  var box = document.getElementById('kinematic-agent-diagnostics-copy');
  var button = document.getElementById('kinematic-agent-copy-diagnostics');
  if (!box) {
    return;
  }
  var text = box.value || '';
  function copied() {
    if (button) {
      button.textContent = 'Copied';
      window.setTimeout(function() { button.textContent = 'Copy'; }, 1200);
    }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(copied, function() {
      box.focus();
      box.select();
      document.execCommand('copy');
      copied();
    });
    return;
  }
  box.focus();
  box.select();
  document.execCommand('copy');
  copied();
}

function collectKinematicSignals(state) {
  var latestEvent = state.latest_event || {};
  var signals = [];
  var details = latestEvent.details || {};
  var bundle = details.compile_signals || {};
  if (Array.isArray(bundle.signals) && bundle.signals.length) {
    bundle.signals.forEach(function(signal) {
      var severity = String(signal.severity || 'note');
      var text = String(signal.code || signal.kind || severity);
      if (signal.joint_name) {
        text += ' ' + String(signal.joint_name);
      }
      if (signal.summary) {
        text += ': ' + String(signal.summary);
      }
      if (signal.detail) {
        text += ' ' + String(signal.detail);
      }
      signals.push({ kind: severity === 'failure' ? 'error' : severity, text: text });
    });
  }
  (latestEvent.errors || []).forEach(function(text) {
    signals.push({ kind: 'error', text: String(text) });
  });
  (latestEvent.warnings || []).forEach(function(text) {
    signals.push({ kind: 'warning', text: String(text) });
  });
  if (latestEvent.event) {
    signals.push({ kind: 'note', text: latestEvent.event });
  }
  return signals.slice(0, 5);
}

function latestKinematicEventWith(predicate, state) {
  var events = Array.isArray(state.events) ? state.events : [];
  for (var i = events.length - 1; i >= 0; i--) {
    if (predicate(events[i])) {
      return events[i];
    }
  }
  return null;
}

function startKinematicFullRangePlayback(manifest, preview) {
  _kinematicAgentState.playbackManifest = manifest;
  _kinematicAgentState.playbackJoints = Array.isArray(manifest.joints)
    ? manifest.joints.filter(function(joint) {
      return Array.isArray(joint.range) && joint.range.length === 2;
    })
    : [];
  _kinematicAgentState.playbackStartMs = performance.now();
  _kinematicAgentState.activeJointName = null;
  if (
    isKinematicRunFinishedPassed(_kinematicAgentState.latestState)
    || (preview && preview.playback && preview.playback.mode === 'manual_sliders')
  ) {
    stopKinematicPlaybackAtManualState('manual sliders ready');
    return;
  }
  if (preview && preview.preview_kind === 'rest') {
    stopKinematicPlaybackAtManualState('rest pose');
    setKinematicProgress(0, 'asset loaded, limits unknown');
    return;
  }
  if (_kinematicAgentState.playbackFrameId === null) {
    _kinematicAgentState.playbackFrameId = window.requestAnimationFrame(tickKinematicPlayback);
  }
}

function tickKinematicPlayback(nowMs) {
  _kinematicAgentState.playbackFrameId = null;
  var joints = _kinematicAgentState.playbackJoints || [];
  if (!_kinematicAgentState.enabled || joints.length === 0) {
    return;
  }
  var secondsPerJoint = 1.8;
  var elapsed = Math.max(0, (nowMs - _kinematicAgentState.playbackStartMs) / 1000);
  var slot = Math.floor(elapsed / secondsPerJoint) % joints.length;
  var phase = (elapsed % secondsPerJoint) / secondsPerJoint;
  var wave = phase < 0.5 ? phase * 2 : (1 - phase) * 2;
  var active = joints[slot];
  joints.forEach(function(joint) {
    var value = joint.default || 0;
    if (joint.name === active.name) {
      value = Number(joint.range[0]) + (Number(joint.range[1]) - Number(joint.range[0])) * wave;
    }
    try {
      applyJointPreview(joint.name, value);
      if (_jointSliderMap[joint.name]) {
        _jointSliderMap[joint.name].input.value = String(value);
        updateJointSliderValueLabel(joint.name, value);
      }
    } catch (err) {
      // Scene may still be rebuilding; the next animation frame will retry.
    }
  });
  _kinematicAgentState.activeJointName = active.name;
  document.getElementById('kinematic-agent-playback').textContent = active.name + ' full range';
  _kinematicAgentState.playbackFrameId = window.requestAnimationFrame(tickKinematicPlayback);
}

function isKinematicRunFinishedPassed(state) {
  var latestEvent = (state || {}).latest_event || {};
  return latestEvent.event === 'run_finished' && latestEvent.status === 'passed';
}

function stopKinematicPlaybackAtManualState(label) {
  if (_kinematicAgentState.playbackFrameId !== null) {
    window.cancelAnimationFrame(_kinematicAgentState.playbackFrameId);
    _kinematicAgentState.playbackFrameId = null;
  }
  (_kinematicAgentState.playbackJoints || []).forEach(function(joint) {
    var value = Number(joint.default || 0);
    try {
      applyJointPreview(joint.name, value);
      if (_jointSliderMap[joint.name]) {
        _jointSliderMap[joint.name].input.value = String(value);
        updateJointSliderValueLabel(joint.name, value);
      }
    } catch (_err) {
      // Scene may still be rebuilding; the next poll or user slider action will retry.
    }
  });
  document.getElementById('kinematic-agent-playback').textContent = label || 'manual';
}

function setKinematicProgress(fraction, label) {
  var fill = document.getElementById('kinematic-agent-progress-fill');
  var labelEl = document.getElementById('kinematic-agent-progress-label');
  var valueEl = document.getElementById('kinematic-agent-progress-value');
  if (!fill || !labelEl || !valueEl) {
    return;
  }
  var clamped = Math.max(0, Math.min(Number(fraction) || 0, 1));
  fill.style.width = String(Math.round(clamped * 100)) + '%';
  labelEl.textContent = label || 'waiting';
  valueEl.textContent = String(Math.round(clamped * 100)) + '%';
}

function formatKinematicNumber(value) {
  var number = Number(value);
  return Number.isFinite(number) ? number.toFixed(3) : String(value);
}

function formatKinematicEstimateRange(jointType, lower, upper) {
  var minValue = Number(lower);
  var maxValue = Number(upper);
  if (!Number.isFinite(minValue) || !Number.isFinite(maxValue)) {
    return '[' + String(lower) + ', ' + String(upper) + ']';
  }
  if (jointType === 'prismatic' || jointType === 'slide') {
    return '[' + formatMillimeters(minValue) + ', ' + formatMillimeters(maxValue) + ']';
  }
  if (jointType === 'revolute' || jointType === 'hinge') {
    return '[' + minValue.toFixed(3) + ', ' + maxValue.toFixed(3) + '] rad';
  }
  return '[' + formatKinematicNumber(minValue) + ', ' + formatKinematicNumber(maxValue) + ']';
}

function escapeHtml(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch) {
    return {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[ch];
  });
}

function deepCloneJson(value) {
  return JSON.parse(JSON.stringify(value));
}

function setWorkbenchGlobalOrientation(orientation) {
  if (orientation === null || typeof orientation !== 'object') {
    return;
  }
  _workbenchGlobalOrientationDegrees = {
    roll: Number(orientation.roll || 0),
    pitch: Number(orientation.pitch || 0),
    yaw: Number(orientation.yaw || 0)
  };
  applyWorkbenchGlobalOrientationToRoot();
}

function applyWorkbenchGlobalOrientationToRoot() {
  if (!rootGroup) {
    return;
  }
  rootGroup.rotation.set(
    THREE.MathUtils.degToRad(_workbenchGlobalOrientationDegrees.roll),
    THREE.MathUtils.degToRad(_workbenchGlobalOrientationDegrees.pitch),
    THREE.MathUtils.degToRad(_workbenchGlobalOrientationDegrees.yaw),
    'XYZ'
  );
  rootGroup.updateMatrixWorld(true);
}

window.addEventListener('message', function(event) {
  if (event.origin !== window.location.origin) {
    return;
  }
  var data = event.data || {};
  if (data.type !== 'set-global-orientation') {
    return;
  }
  setWorkbenchGlobalOrientation(data.orientation_degrees || {});
});

function loadManifestIntoDraftAndBuildScene(manifest, options) {
  if (manifest === null || typeof manifest !== 'object') {
    throw new Error('Manifest payload must be an object');
  }
  _draftManifest = deepCloneJson(manifest);
  _uiState.mergeSelection = new Set();
  _uiState.lastMergeSnapshot = null;
  _uiState.isDirty = false;
  setSaveStatus('Saved');
  return rebuildFromDraft(options);
}

function setSaveStatus(status) {
  _uiState.saveStatus = status;
  var label = document.getElementById('save-status-text');
  if (label) {
    label.textContent = status;
  }
  updateSaveButtonState();
}

function setExportStatus(status, isError) {
  _uiState.exportStatusText = typeof status === 'string' ? status : '';
  _uiState.exportStatusIsError = isError === true;
  renderExportStatus();
}

function renderExportStatus() {
  var label = document.getElementById('export-status-text');
  if (!label) {
    return;
  }

  var text = '';
  if (_uiState.isExporting) {
    text = 'Exporting USD...';
  } else if (_uiState.exportStatusText) {
    text = _uiState.exportStatusText;
  } else if (_uiState.isaacReady !== true) {
    text = _uiState.isaacStatus || 'Isaac Sim 启动中...';
  }

  label.textContent = text;
  label.classList.toggle('error', _uiState.exportStatusIsError === true);
}

function updateExportButtonState() {
  var exportButton = document.getElementById('export-usd-button');
  if (!exportButton) {
    return;
  }

  var disabled = (
    _uiState.isExporting ||
    !assetName ||
    _draftManifest === null ||
    _uiState.saveStatus === 'Saving...' ||
    _uiState.isDirty ||
    hasUncommittedActiveJointEdit() ||
    _uiState.isaacReady !== true
  );

  var buttonText = 'Export USD';
  if (_uiState.isExporting) {
    buttonText = 'Exporting USD...';
  } else if (_uiState.isDirty) {
    buttonText = 'Save XML first';
  } else if (_uiState.isaacReady !== true) {
    buttonText = 'Isaac Sim 启动中...';
  }

  exportButton.disabled = disabled;
  exportButton.textContent = buttonText;
  exportButton.title = _uiState.isaacReady === true ? '' : (_uiState.isaacStatus || 'Isaac Sim 启动中...');
  renderExportStatus();
}

function updateSaveButtonState() {
  var saveButton = document.getElementById('save-xml-button');

  if (saveButton) {
    saveButton.disabled = (
      _uiState.saveStatus === 'Saving...' ||
      !assetName ||
      _draftManifest === null ||
      hasUncommittedActiveJointEdit()
    );
  }
  updateExportButtonState();
  renderMergeEditorCard();
}

function markDraftDirty() {
  _uiState.isDirty = true;
  setSaveStatus('Dirty');
}

function numericArraysAlmostEqual(left, right, epsilon) {
  if (!Array.isArray(left) || !Array.isArray(right) || left.length !== right.length) {
    return false;
  }
  for (var i = 0; i < left.length; i++) {
    if (typeof left[i] !== 'number' || typeof right[i] !== 'number') {
      return false;
    }
    if (Math.abs(left[i] - right[i]) > epsilon) {
      return false;
    }
  }
  return true;
}

function hasUncommittedActiveJointEdit() {
  if (_uiState.activeJointName === null || _uiState.activeJointEditMode === null) {
    return false;
  }
  var joint = getDraftJointByName(_uiState.activeJointName);
  if (joint === null) {
    return false;
  }
  return (
    _uiState.activeJointTempType !== joint.type ||
    !numericArraysAlmostEqual(_uiState.activeJointTempRange, joint.range, 1e-9) ||
    !numericArraysAlmostEqual(_uiState.activeJointTempAnchor, joint.anchor, 1e-9) ||
    !numericArraysAlmostEqual(_uiState.activeJointTempAxis, joint.axis, 1e-9)
  );
}

function requireDraftManifest() {
  if (_draftManifest === null || typeof _draftManifest !== 'object') {
    throw new Error('Draft manifest is not initialized');
  }
  return _draftManifest;
}

function getDraftRootBodyName() {
  var draftManifest = requireDraftManifest();
  if (!Array.isArray(draftManifest.bodies)) {
    throw new Error('Draft manifest bodies are not initialized');
  }
  var rootBodies = draftManifest.bodies.filter(function(body) {
    return body.parent === null || body.parent === '' || body.parent === 'world';
  });
  if (rootBodies.length !== 1) {
    throw new Error('Draft manifest must contain exactly one root body');
  }
  return rootBodies[0].name;
}

function buildSavePayload() {
  var draftManifest = requireDraftManifest();
  if (typeof draftManifest.xml_path !== 'string' || draftManifest.xml_path.length === 0) {
    throw new Error('Draft manifest xml_path must be a non-empty string');
  }
  if (!Array.isArray(draftManifest.bodies)) {
    throw new Error('Draft manifest bodies are not initialized');
  }
  if (!Array.isArray(draftManifest.joints)) {
    throw new Error('Draft manifest joints are not initialized');
  }

  var rootBodyName = getDraftRootBodyName();
  var jointIdsByBody = Object.create(null);
  draftManifest.joints.forEach(function(joint) {
    if (typeof joint.body !== 'string' || joint.body.length === 0) {
      throw new Error('Draft joint body must be a non-empty string');
    }
    if (!Object.prototype.hasOwnProperty.call(jointIdsByBody, joint.body)) {
      jointIdsByBody[joint.body] = [];
    }
    jointIdsByBody[joint.body].push(joint.name);
  });

  return {
    xml_path: draftManifest.xml_path,
    scene_graph: {
      root_body: rootBodyName,
      bodies: draftManifest.bodies.map(function(body) {
        if (typeof body.id !== 'string' || body.id.length === 0) {
          throw new Error('Draft body id must be a non-empty string');
        }
        if (typeof body.name !== 'string' || body.name.length === 0) {
          throw new Error('Draft body name must be a non-empty string');
        }
        if (!Array.isArray(body.pos) || body.pos.length !== 3) {
          throw new Error('Draft body ' + body.name + ' pos must be a length-3 array');
        }
        if (!Array.isArray(body.quat) || body.quat.length !== 4) {
          throw new Error('Draft body ' + body.name + ' quat must be a length-4 array');
        }
        if (!Array.isArray(body.visual_geoms)) {
          throw new Error('Draft body ' + body.name + ' visual_geoms must be an array');
        }
        if (!Array.isArray(body.collision_geoms)) {
          throw new Error('Draft body ' + body.name + ' collision_geoms must be an array');
        }
        return {
          id: body.id,
          name: body.name,
          parent: (body.parent === '' || body.parent === 'world') ? null : body.parent,
          pos: deepCloneJson(body.pos),
          quat: deepCloneJson(body.quat),
          visual_geoms: deepCloneJson(body.visual_geoms),
          collision_geoms: deepCloneJson(body.collision_geoms),
          joint_ids: Object.prototype.hasOwnProperty.call(jointIdsByBody, body.name) ? jointIdsByBody[body.name].slice() : [],
          merged_from: Array.isArray(body.merged_from) ? deepCloneJson(body.merged_from) : []
        };
      }),
      joints: draftManifest.joints.map(function(joint) {
        if (typeof joint.name !== 'string' || joint.name.length === 0) {
          throw new Error('Draft joint name must be a non-empty string');
        }
        return {
          id: typeof joint.id === 'string' && joint.id.length > 0 ? joint.id : joint.name,
          name: joint.name,
          body: joint.body,
          type: joint.type,
          anchor: deepCloneJson(joint.anchor),
          axis: deepCloneJson(joint.axis),
          range: deepCloneJson(joint.range),
          default: joint.default,
          order: joint.order
        };
      })
    }
  };
}

function handleSaveXml() {
  if (!assetName) {
    throw new Error('Select an asset before saving XML');
  }
  requireDraftManifest();
  if (hasUncommittedActiveJointEdit()) {
    throw new Error('Apply or stop the active temporary joint edit before saving XML');
  }
  hideError();
  setSaveStatus('Saving...');

  return fetch('/api/assets/' + encodeURIComponent(assetName) + '/save-xml', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(buildSavePayload())
  })
    .then(function(response) {
      return response.json().then(function(body) {
        return {
          ok: response.ok,
          body: body
        };
      });
    })
    .then(function(result) {
      if (result.body && result.body.status === 'ok') {
        if (result.body.manifest === null || typeof result.body.manifest !== 'object') {
          throw new Error('Save response is missing manifest');
        }
        return loadManifestIntoDraftAndBuildScene(result.body.manifest, {
          preserveCamera: true,
          preserveSelection: true
        }).then(function() {
          _uiState.isDirty = false;
          setSaveStatus('Saved');
        });
      }

      setSaveStatus('Save failed');
      showError('Save failed: ' + String(result.body && result.body.message ? result.body.message : 'Unknown save error'));
    })
    .catch(function(err) {
      setSaveStatus('Save failed');
      showError('Save failed: ' + String(err && err.message ? err.message : err));
    });
}

function clearIsaacStatusPollTimer() {
  if (_uiState.isaacStatusPollTimerId !== null) {
    window.clearTimeout(_uiState.isaacStatusPollTimerId);
    _uiState.isaacStatusPollTimerId = null;
  }
}

function scheduleIsaacStatusPoll(delayMs) {
  clearIsaacStatusPollTimer();
  if (_uiState.isaacReady === true) {
    return;
  }
  _uiState.isaacStatusPollTimerId = window.setTimeout(function() {
    _uiState.isaacStatusPollTimerId = null;
    pollIsaacStatus();
  }, delayMs);
}

function setIsaacStatusState(ready, message) {
  _uiState.isaacReady = ready === true;
  _uiState.isaacStatus = _uiState.isaacReady === true
    ? ''
    : (typeof message === 'string' && message.length > 0 ? message : 'Isaac Sim 启动中...');
  if (_uiState.isaacReady === true) {
    clearIsaacStatusPollTimer();
  }
  updateExportButtonState();
}

function pollIsaacStatus() {
  fetch('/api/isaac-status')
    .then(function(response) {
      return response.json().then(function(body) {
        return {
          ok: response.ok,
          body: body
        };
      });
    })
    .then(function(result) {
      if (result.body && result.body.ready === true) {
        setIsaacStatusState(true, '');
        return;
      }
      setIsaacStatusState(false, result.body && result.body.message ? String(result.body.message) : 'Isaac Sim 启动中...');
      scheduleIsaacStatusPoll(2000);
    })
    .catch(function(err) {
      setIsaacStatusState(false, String(err && err.message ? err.message : err));
      scheduleIsaacStatusPoll(2000);
    });
}

function handleExportUsd() {
  if (!assetName) {
    throw new Error('Select an asset before exporting USD');
  }
  requireDraftManifest();
  if (_uiState.isDirty) {
    throw new Error('Save XML before exporting USD');
  }
  if (_uiState.saveStatus === 'Saving...') {
    throw new Error('Wait for XML save to finish before exporting USD');
  }
  if (hasUncommittedActiveJointEdit()) {
    throw new Error('Apply or stop the active temporary joint edit before exporting USD');
  }
  if (_uiState.isaacReady !== true) {
    throw new Error('Isaac Sim is still starting');
  }
  if (_uiState.isExporting) {
    return;
  }

  hideError();
  _uiState.isExporting = true;
  setExportStatus('', false);
  updateExportButtonState();

  return fetch('/api/assets/' + encodeURIComponent(assetName) + '/export-usd', {
    method: 'POST'
  })
    .then(function(response) {
      return response.json().then(function(body) {
        return {
          ok: response.ok,
          statusCode: response.status,
          body: body
        };
      });
    })
    .then(function(result) {
      if (result.ok && result.body && result.body.status === 'ok') {
        setExportStatus('Exported: ' + String(result.body.output_path).split('/').pop(), false);
        return;
      }

      if (result.statusCode === 503) {
        setIsaacStatusState(false, result.body && result.body.message ? String(result.body.message) : 'Isaac Sim 启动中...');
        scheduleIsaacStatusPoll(0);
      }

      setExportStatus('Export failed', true);
      showError('Export failed: ' + String(result.body && result.body.message ? result.body.message : 'Unknown export error'));
    })
    .catch(function(err) {
      setExportStatus('Export failed', true);
      showError('Export failed: ' + String(err && err.message ? err.message : err));
    })
    .then(function() {
      _uiState.isExporting = false;
      updateExportButtonState();
    });
}

function rebuildFromDraft(options) {
  if (_draftManifest === null) {
    throw new Error('Draft manifest is not initialized');
  }
  var preserveCamera = options && options.preserveCamera === true;
  var preserveSelection = options && options.preserveSelection === true;
  var selectedBodyName = null;
  if (options && Object.prototype.hasOwnProperty.call(options, 'selectedBodyName')) {
    selectedBodyName = options.selectedBodyName;
  } else if (preserveSelection) {
    selectedBodyName = _selectedBodyName;
  }
  var cameraState = preserveCamera ? captureCameraState() : null;

  stopTransformEditing();
  return buildScene(deepCloneJson(_draftManifest)).then(function() {
    if (cameraState !== null) {
      restoreCameraState(cameraState);
    }
    if (selectedBodyName !== null && Object.prototype.hasOwnProperty.call(_mjBodyMap, selectedBodyName)) {
      setSelectedBody(selectedBodyName);
      return;
    }
    renderJointEditorCard();
  });
}

// ============================================================
// buildScene — port of _buildMjScene with two-layer node model
// ============================================================
function buildScene(manifest) {
  if (manifest === null || typeof manifest !== 'object') {
    throw new Error('Manifest payload must be an object');
  }
  if (!Array.isArray(manifest.bodies)) {
    throw new Error('Manifest bodies must be an array');
  }
  if (!Array.isArray(manifest.joints)) {
    throw new Error('Manifest joints must be an array');
  }
  if (typeof manifest.asset_base_url !== 'string') {
    throw new Error('Manifest asset_base_url must be a string');
  }

  var bodies = manifest.bodies;
  var joints = manifest.joints;
  var baseUrl = manifest.asset_base_url;

  hideError();

  if (rootGroup) {
    scene.remove(rootGroup);
    disposeGroup(rootGroup);
    rootGroup = null;
  }
  resetSceneState();

  if (bodies.length === 0) {
    showStatus('No body data in manifest');
    return Promise.resolve();
  }

  var jointsByBody = Object.create(null);
  var jointNames = Object.create(null);
  bodies.forEach(function(body) {
    validateBodyManifestEntry(body);
    if (Object.prototype.hasOwnProperty.call(jointsByBody, body.name)) {
      throw new Error('Duplicate body name in manifest: ' + body.name);
    }
    jointsByBody[body.name] = [];
  });

  joints.forEach(function(joint) {
    validateJointManifestEntry(joint, jointsByBody);
    if (Object.prototype.hasOwnProperty.call(jointNames, joint.name)) {
      throw new Error('Duplicate joint name in manifest: ' + joint.name);
    }
    jointNames[joint.name] = true;
    jointsByBody[joint.body].push(joint);
  });

  bodies.forEach(function(body) {
    if (jointsByBody[body.name].length > 1) {
      throw new Error(
        'Phase 2 preview currently supports at most one hinge/slide joint per body: ' + body.name
      );
    }
  });

  var loadPromises = bodies.map(function(body) {
    if (body.mesh_file === null) {
      return Promise.resolve({
        name: body.name,
        primaryMesh: null,
        extraMeshByFile: Object.create(null)
      });
    }
    return loadBodyPreviewMeshes(body, baseUrl);
  });

  return Promise.all(loadPromises).then(function(results) {
    rootGroup = new THREE.Group();
    rootGroup.name = 'mjcf-root';

    var bodyNodes = Object.create(null);
    var meshBundleByName = Object.create(null);
    var helperNodesByJointName = Object.create(null);

    results.forEach(function(result) {
      meshBundleByName[result.name] = result;
    });

    bodies.forEach(function(body) {
      var bodyGroup = new THREE.Group();
      bodyGroup.name = 'body_' + body.name;
      bodyGroup.position.copy(readVector3(body.pos, 'Body ' + body.name + ' pos'));
      bodyGroup.quaternion.copy(readQuaternionWxyz(body.quat, 'Body ' + body.name + ' quat'));

      var helperGroup = new THREE.Group();
      helperGroup.name = 'helpers_' + body.name;
      bodyGroup.add(helperGroup);

      var bodyEntry = {
        bodyGroup: bodyGroup,
        meshes: [],
        helperGroup: helperGroup
      };
      _mjBodyMap[body.name] = bodyEntry;

      var bodyJoints = jointsByBody[body.name];
      bodyJoints.forEach(function(joint) {
        var helperNode = createJointHelperGroup(joint);
        helperGroup.add(helperNode);
        helperNodesByJointName[joint.name] = helperNode;
      });

      var meshBundle = meshBundleByName[body.name];
      if (!meshBundle) {
        throw new Error('Missing loaded mesh bundle for body ' + body.name);
      }
      var mesh = meshBundle.primaryMesh;

      if (bodyJoints.length === 0) {
        attachBodyVisualMeshes(body, bodyEntry, bodyGroup, mesh, meshBundle.extraMeshByFile, null, null);
      }

      if (bodyJoints.length === 1) {
        var joint = bodyJoints[0];
        var jointData = getValidatedJointData(joint);

        var jointPivot = new THREE.Group();
        jointPivot.name = 'pivot_' + joint.name;
        jointPivot.position.copy(jointData.anchor);

        var jointMeshes = attachBodyVisualMeshes(
          body,
          bodyEntry,
          jointPivot,
          mesh,
          meshBundle.extraMeshByFile,
          joint.type,
          jointData.anchor
        );

        bodyGroup.add(jointPivot);
        _mjJointMap[joint.name] = {
          node: jointPivot,
          type: joint.type,
          axis: jointData.axis.clone(),
          range: [jointData.range[0], jointData.range[1]],
          defaultVal: jointData.defaultVal,
          restPosition: jointPivot.position.clone(),
          restQuaternion: jointPivot.quaternion.clone(),
          bodyLocalOriginOffset: getJointedMeshLocalOffset(joint.type, jointData.anchor),
          bodyName: body.name,
          helperNode: helperNodesByJointName[joint.name],
          meshNodes: jointMeshes
        };
      }

      bodyNodes[body.name] = bodyGroup;
    });

    bodies.forEach(function(body) {
      var node = bodyNodes[body.name];
      var parentName = body.parent;

      if (parentName === null || parentName === '' || parentName === 'world') {
        rootGroup.add(node);
        return;
      }
      if (!Object.prototype.hasOwnProperty.call(bodyNodes, parentName)) {
        throw new Error('Body ' + body.name + ' references unknown parent body: ' + parentName);
      }
      bodyNodes[parentName].add(node);
    });

    rootGroup.updateMatrixWorld(true);
    buildJointPanel(joints);
    applyManifestJointDefaults(joints);

    scene.add(rootGroup);
    applyWorkbenchGlobalOrientationToRoot();
    autoFrameRootGroup(rootGroup);

    var meshCount = Object.keys(_mjBodyMap).reduce(function(total, bodyName) {
      return total + _mjBodyMap[bodyName].meshes.length;
    }, 0);
    showStatus(assetName + ' — ' + meshCount + ' mesh' + (meshCount !== 1 ? 'es' : '') + ' loaded');
    updateSelectedBodyLabel();
  });
}

function validateBodyManifestEntry(body) {
  if (body === null || typeof body !== 'object') {
    throw new Error('Body manifest entry must be an object');
  }
  if (typeof body.name !== 'string' || body.name.length === 0) {
    throw new Error('Body entry is missing a valid name');
  }
  if (body.parent !== null && typeof body.parent !== 'string') {
    throw new Error('Body ' + body.name + ' has invalid parent field');
  }
  readVector3(body.pos, 'Body ' + body.name + ' pos');
  readQuaternionWxyz(body.quat, 'Body ' + body.name + ' quat');
  if (body.mesh_file !== null && typeof body.mesh_file !== 'string') {
    throw new Error('Body ' + body.name + ' has invalid mesh_file field');
  }
  if (!Array.isArray(body.visual_geoms)) {
    throw new Error('Body ' + body.name + ' visual_geoms must be an array');
  }
  if (!Array.isArray(body.collision_geoms)) {
    throw new Error('Body ' + body.name + ' collision_geoms must be an array');
  }
}

function validateJointManifestEntry(joint, jointsByBody) {
  if (joint === null || typeof joint !== 'object') {
    throw new Error('Joint manifest entry must be an object');
  }
  if (typeof joint.name !== 'string' || joint.name.length === 0) {
    throw new Error('Joint entry is missing a valid name');
  }
  if (typeof joint.body !== 'string' || joint.body.length === 0) {
    throw new Error('Joint ' + joint.name + ' is missing a valid body reference');
  }
  if (!Object.prototype.hasOwnProperty.call(jointsByBody, joint.body)) {
    throw new Error('Joint ' + joint.name + ' references unknown body ' + joint.body);
  }
  getValidatedJointData(joint);
}

function getValidatedJointData(joint) {
  if (joint.type !== 'hinge' && joint.type !== 'slide') {
    throw new Error('Unsupported joint type in Phase 2 preview: ' + joint.name + ' (' + String(joint.type) + ')');
  }

  var anchorVec = readVector3(joint.anchor, 'Joint ' + joint.name + ' anchor');
  var axisVec = readVector3(joint.axis, 'Joint ' + joint.name + ' axis');
  if (axisVec.lengthSq() === 0) {
    throw new Error('Joint ' + joint.name + ' axis must have non-zero length');
  }
  axisVec.normalize();

  var range = readRangePair(joint.range, 'Joint ' + joint.name + ' range');
  var defaultVal = readFiniteNumber(joint.default, 'Joint ' + joint.name + ' default');
  if (defaultVal < range[0] || defaultVal > range[1]) {
    throw new Error('Joint ' + joint.name + ' default must lie within its range');
  }

  return {
    anchor: anchorVec,
    axis: axisVec,
    range: range,
    defaultVal: defaultVal
  };
}

function getJointedMeshLocalOffset(jointType, anchorVec) {
  if (jointType === null) {
    return new THREE.Vector3(0, 0, 0);
  }
  if (jointType === 'hinge' || jointType === 'slide') {
    return anchorVec.clone().multiplyScalar(-1);
  }
  throw new Error('Unsupported jointed mesh offset type: ' + String(jointType));
}

function readVector3(value, label) {
  if (!Array.isArray(value)) {
    throw new Error(label + ' must be an array');
  }
  if (value.length !== 3) {
    throw new Error(label + ' must contain exactly 3 values');
  }
  return new THREE.Vector3(
    readFiniteNumber(value[0], label + '[0]'),
    readFiniteNumber(value[1], label + '[1]'),
    readFiniteNumber(value[2], label + '[2]')
  );
}

function readRangePair(value, label) {
  if (!Array.isArray(value)) {
    throw new Error(label + ' must be an array');
  }
  if (value.length !== 2) {
    throw new Error(label + ' must contain exactly 2 values');
  }
  var minValue = readFiniteNumber(value[0], label + '[0]');
  var maxValue = readFiniteNumber(value[1], label + '[1]');
  if (minValue > maxValue) {
    throw new Error(label + ' must satisfy min <= max');
  }
  return [minValue, maxValue];
}

function readFiniteNumber(value, label) {
  if (typeof value !== 'number' || Number.isFinite(value) === false) {
    throw new Error(label + ' must be a finite number');
  }
  return value;
}

function loadBodyMesh(body, baseUrl) {
  return loadMeshTemplate(body.mesh_file, 'body ' + body.name, baseUrl).then(function(mesh) {
    return { name: body.name, mesh: mesh };
  });
}

function loadMeshTemplate(meshFile, label, baseUrl) {
  if (typeof meshFile !== 'string' || meshFile.length === 0) {
    throw new Error(label + ' mesh_file must be a non-empty string');
  }
  var normalizedMeshFile = normalizeAssetPath(baseUrl, meshFile);
  var url = buildAssetUrl(baseUrl, meshFile);
  var meshName = normalizedMeshFile.replace(/\.obj$/i, '');
  var texUrl = buildAssetUrl(baseUrl, meshName + '_albedo.png');

  return new Promise(function(resolve, reject) {
    var loader = new THREE.OBJLoader();
    loader.load(url, function(obj) {
      var geoms = [];
      obj.traverse(function(child) {
        if (child.isMesh && child.geometry) {
          geoms.push(child.geometry);
        }
      });
      if (geoms.length === 0) {
        reject(new Error('OBJ file contains no mesh geometry for ' + label + ': ' + url));
        return;
      }

      var merged = geoms.length === 1 ? geoms[0] : THREE.BufferGeometryUtils.mergeBufferGeometries(geoms);
      if (merged === null) {
        reject(new Error('Failed to merge OBJ geometries for ' + label + ': ' + url));
        return;
      }
      merged.computeBoundingBox();
      merged.computeBoundingSphere();

      var texLoader = new THREE.TextureLoader();
      texLoader.load(texUrl, function(texture) {
        texture.flipY = true;
        var material = new THREE.MeshStandardMaterial({
          map: texture,
          roughness: 0.6,
          metalness: 0.1
        });
        forceOpaquePreviewMaterial(material);
        resolve(new THREE.Mesh(merged, material));
      }, undefined, function() {
        resolve(new THREE.Mesh(merged, createFallbackMeshMaterial(label)));
      });
    }, undefined, function() {
      reject(new Error('Failed to load OBJ for ' + label + ': ' + url));
    });
  });
}

function normalizeAssetPath(baseUrl, assetPath) {
  var path = String(assetPath || '').replace(/^\.\/+/, '');
  if (/^(?:https?:)?\/\//i.test(path) || path.charAt(0) === '/') {
    return path;
  }
  if (/\/assets\/?$/.test(String(baseUrl || '')) && path.indexOf('assets/') === 0) {
    return path.slice('assets/'.length);
  }
  return path;
}

function buildAssetUrl(baseUrl, assetPath) {
  var path = normalizeAssetPath(baseUrl, assetPath);
  if (/^(?:https?:)?\/\//i.test(path) || path.charAt(0) === '/') {
    return path;
  }
  return String(baseUrl || '').replace(/\/+$/, '') + '/' + path.replace(/^\/+/, '');
}

function createFallbackMeshMaterial(label) {
  var hue = Math.abs(hashString(label || 'mesh')) % 360;
  var color = new THREE.Color('hsl(' + hue + ', 42%, 64%)');
  var material = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.72,
    metalness: 0.06
  });
  forceOpaquePreviewMaterial(material);
  return material;
}

function forceOpaquePreviewMaterial(material) {
  material.transparent = false;
  material.opacity = 1.0;
  material.depthWrite = true;
  material.depthTest = true;
  material.alphaTest = 0.0;
  material.side = THREE.DoubleSide;
  material.needsUpdate = true;
}

function hashString(value) {
  var hash = 0;
  for (var i = 0; i < value.length; i++) {
    hash = ((hash << 5) - hash + value.charCodeAt(i)) | 0;
  }
  return hash;
}

function createJointHelperGroup(joint) {
  var jointData = getValidatedJointData(joint);
  var helperGroup = new THREE.Group();
  helperGroup.name = 'joint_helper_' + joint.name;

  var anchorSphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.005, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false })
  );
  anchorSphere.position.copy(jointData.anchor);
  anchorSphere.renderOrder = 999;
  helperGroup.add(anchorSphere);

  var axisArrow = new THREE.ArrowHelper(
    jointData.axis.clone(),
    jointData.anchor.clone(),
    0.06,
    0x33cc66,
    0.012,
    0.008
  );
  helperGroup.add(axisArrow);

  if (joint.type === 'hinge') {
    helperGroup.add(createHingeRangeArc(joint.name, jointData.anchor, jointData.axis, jointData.range));
    return helperGroup;
  }
  if (joint.type === 'slide') {
    helperGroup.add(createSlideRangeRail(joint.name, jointData.anchor, jointData.axis, jointData.range));
    return helperGroup;
  }

  throw new Error('Unsupported joint helper type: ' + joint.name + ' (' + String(joint.type) + ')');
}

function createHingeRangeArc(jointName, anchorVec, axisVec, range) {
  var basis = buildPerpendicularBasis(axisVec, jointName);
  var points = [];
  var radius = 0.04;
  var segmentCount = 48;

  for (var i = 0; i <= segmentCount; i++) {
    var alpha = i / segmentCount;
    var angle = range[0] + (range[1] - range[0]) * alpha;
    var point = anchorVec.clone()
      .add(basis.tangent.clone().multiplyScalar(Math.cos(angle) * radius))
      .add(basis.bitangent.clone().multiplyScalar(Math.sin(angle) * radius));
    points.push(point);
  }

  // range arc
  var hingeArcGeometry = new THREE.BufferGeometry().setFromPoints(points);
  var hingeArc = new THREE.Line(
    hingeArcGeometry,
    new THREE.LineBasicMaterial({ color: 0x33cc66, transparent: true, opacity: 0.95 })
  );
  hingeArc.name = 'hingeArc_' + jointName;
  return hingeArc;
}

function createSlideRangeRail(jointName, anchorVec, axisVec, range) {
  var startPoint = anchorVec.clone().addScaledVector(axisVec, range[0]);
  var endPoint = anchorVec.clone().addScaledVector(axisVec, range[1]);
  var slideRailGroup = new THREE.Group();
  slideRailGroup.name = 'slideRail_' + jointName;

  // range rail
  var slideRailGeometry = new THREE.BufferGeometry().setFromPoints([startPoint, endPoint]);
  var slideRail = new THREE.Line(
    slideRailGeometry,
    new THREE.LineBasicMaterial({ color: 0x33cc66, transparent: true, opacity: 0.95 })
  );
  slideRail.name = 'slideRailLine_' + jointName;
  slideRailGroup.add(slideRail);

  var minMarker = new THREE.Mesh(
    new THREE.SphereGeometry(0.004, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0xff6b4a, depthTest: false })
  );
  minMarker.position.copy(startPoint);
  minMarker.renderOrder = 998;
  slideRailGroup.add(minMarker);

  var maxMarker = new THREE.Mesh(
    new THREE.SphereGeometry(0.004, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0x4fb3ff, depthTest: false })
  );
  maxMarker.position.copy(endPoint);
  maxMarker.renderOrder = 998;
  slideRailGroup.add(maxMarker);

  return slideRailGroup;
}

function buildPerpendicularBasis(axisVec, jointName) {
  var referenceVec = Math.abs(axisVec.z) < 0.9
    ? new THREE.Vector3(0, 0, 1)
    : new THREE.Vector3(1, 0, 0);
  var tangentVec = new THREE.Vector3().crossVectors(axisVec, referenceVec);
  if (tangentVec.lengthSq() === 0) {
    throw new Error('Failed to build hinge arc basis for joint ' + jointName);
  }
  tangentVec.normalize();
  var bitangentVec = new THREE.Vector3().crossVectors(axisVec, tangentVec);
  bitangentVec.normalize();
  return {
    tangent: tangentVec,
    bitangent: bitangentVec
  };
}

function getBodyVisualGeoms(body) {
  if (!Array.isArray(body.visual_geoms)) {
    throw new Error('Body ' + body.name + ' is missing visual_geoms');
  }
  return body.visual_geoms;
}

function validateVisualGeomEntry(bodyName, geom, index) {
  if (geom === null || typeof geom !== 'object') {
    throw new Error('Body ' + bodyName + ' visual_geoms[' + index + '] must be an object');
  }
  if (typeof geom.name !== 'string' || geom.name.length === 0) {
    throw new Error('Body ' + bodyName + ' visual_geoms[' + index + '] is missing a valid name');
  }
  if (typeof geom.mesh_file !== 'string' || geom.mesh_file.length === 0) {
    throw new Error('Geom ' + geom.name + ' is missing mesh_file');
  }
  readVector3(geom.pos, 'Geom ' + geom.name + ' pos');
  readQuaternionWxyz(geom.quat, 'Geom ' + geom.name + ' quat');
  readVector3(geom.mesh_pos, 'Geom ' + geom.name + ' mesh_pos');
  readQuaternionWxyz(geom.mesh_quat, 'Geom ' + geom.name + ' mesh_quat');
}

function clonePreviewMesh(templateMesh, bodyName, geomName) {
  var clone = templateMesh.clone();
  clone.name = 'mesh_' + bodyName + '_' + geomName;
  return clone;
}

function loadBodyPreviewMeshes(body, baseUrl) {
  if (body.mesh_file === null) {
    return Promise.resolve({
      name: body.name,
      primaryMesh: null,
      extraMeshByFile: Object.create(null)
    });
  }
  if (typeof body.mesh_file !== 'string' || body.mesh_file.length === 0) {
    throw new Error('Body ' + body.name + ' has invalid mesh_file');
  }

  var primaryPromise = loadMeshTemplate(body.mesh_file, 'body ' + body.name, baseUrl);
  var extraFiles = [];
  getBodyVisualGeoms(body).forEach(function(geom, index) {
    validateVisualGeomEntry(body.name, geom, index);
    if (geom.mesh_file !== body.mesh_file && extraFiles.indexOf(geom.mesh_file) === -1) {
      extraFiles.push(geom.mesh_file);
    }
  });

  var extraPromises = extraFiles.map(function(meshFile) {
    return loadMeshTemplate(meshFile, 'geom template ' + meshFile + ' for body ' + body.name, baseUrl).then(function(mesh) {
      return {
        meshFile: meshFile,
        mesh: mesh
      };
    });
  });

  return Promise.all([primaryPromise].concat(extraPromises)).then(function(entries) {
    var primaryMesh = entries[0];
    primaryMesh.name = 'mesh_' + body.name;
    var extraMeshByFile = Object.create(null);
    for (var i = 1; i < entries.length; i++) {
      extraMeshByFile[entries[i].meshFile] = entries[i].mesh;
    }
    return {
      name: body.name,
      primaryMesh: primaryMesh,
      extraMeshByFile: extraMeshByFile
    };
  });
}

function positionBodyVisualMesh(mesh, geom, jointType, jointAnchor) {
  applyPreviewMeshLocalPose(mesh, jointType, jointAnchor);
}

function applyPreviewMeshLocalPose(mesh, jointType, jointAnchor) {
  mesh.position.copy(getJointedMeshLocalOffset(jointType, jointAnchor));
  mesh.quaternion.identity();
}

function attachBodyVisualMeshes(body, bodyEntry, parentNode, primaryMesh, extraMeshByFile, jointType, jointAnchor) {
  var visualGeoms = getBodyVisualGeoms(body);
  if (visualGeoms.length === 0) {
    if (primaryMesh !== null) {
      throw new Error('Body ' + body.name + ' has body.mesh_file but no visual_geoms');
    }
    return [];
  }

  var attachedMeshes = [];
  var primaryConsumed = false;
  visualGeoms.forEach(function(geom, index) {
    validateVisualGeomEntry(body.name, geom, index);
    var mesh;
    if (!primaryConsumed && geom.mesh_file === body.mesh_file) {
      mesh = primaryMesh;
      primaryConsumed = true;
    } else if (geom.mesh_file === body.mesh_file) {
      if (primaryMesh === null) {
        throw new Error('Body ' + body.name + ' is missing primary mesh template');
      }
      mesh = clonePreviewMesh(primaryMesh, body.name, geom.name);
    } else {
      if (!Object.prototype.hasOwnProperty.call(extraMeshByFile, geom.mesh_file)) {
        throw new Error('Missing mesh template for geom ' + geom.name + ' (' + geom.mesh_file + ')');
      }
      mesh = clonePreviewMesh(extraMeshByFile[geom.mesh_file], body.name, geom.name);
    }
    positionBodyVisualMesh(mesh, geom, jointType, jointAnchor);
    attachMeshToBody(mesh, body.name, parentNode, bodyEntry);
    attachedMeshes.push(mesh);
  });

  if (primaryMesh !== null && primaryConsumed === false) {
    throw new Error('Primary mesh for body ' + body.name + ' was not used by visual_geoms');
  }

  return attachedMeshes;
}

function attachMeshToBody(mesh, bodyName, parentNode, bodyEntry) {
  ensureOwnedMeshMaterials(mesh);
  mesh.userData.materialState = captureMeshMaterialState(mesh, bodyName);
  parentNode.add(mesh);
  bodyEntry.meshes.push(mesh);
}

function ensureOwnedMeshMaterials(mesh) {
  var materials = getMeshMaterials(mesh);
  var ownedMaterials = materials.map(function(material, index) {
    if (material === null || material.isMaterial !== true) {
      throw new Error('Mesh material is invalid for body ' + mesh.name + ' at index ' + index);
    }
    if (Object.prototype.hasOwnProperty.call(_materialOwnerIds, material.uuid)) {
      var clonedMaterial = material.clone();
      _materialOwnerIds[clonedMaterial.uuid] = mesh.uuid + ':' + index;
      return clonedMaterial;
    }
    _materialOwnerIds[material.uuid] = mesh.uuid + ':' + index;
    return material;
  });
  mesh.material = Array.isArray(mesh.material) ? ownedMaterials : ownedMaterials[0];
}

function captureMeshMaterialState(mesh, bodyName) {
  return getMeshMaterials(mesh).map(function(material, index) {
    if (material.emissive === undefined || typeof material.emissiveIntensity !== 'number') {
      throw new Error('Mesh material does not support emissive highlight for body ' + bodyName + ' at index ' + index);
    }
    return {
      emissive: material.emissive.clone(),
      emissiveIntensity: material.emissiveIntensity
    };
  });
}

function getMeshMaterials(mesh) {
  if (Array.isArray(mesh.material)) {
    if (mesh.material.length === 0) {
      throw new Error('Mesh ' + mesh.name + ' has no materials');
    }
    return mesh.material;
  }
  if (!mesh.material) {
    throw new Error('Mesh ' + mesh.name + ' has no material');
  }
  return [mesh.material];
}

function setSelectedBody(bodyName) {
  if (bodyName !== null && !Object.prototype.hasOwnProperty.call(_mjBodyMap, bodyName)) {
    throw new Error('Unknown body selection: ' + bodyName);
  }
  if (_selectedBodyName === bodyName) {
    updateSelectedBodyLabel();
    updateJointBodyListSelection();
    renderJointEditorCard();
    renderMergeEditorCard();
    return;
  }

  if (_selectedBodyName !== null) {
    applyBodyHighlight(_selectedBodyName, false);
  }
  if (_selectedBodyName !== bodyName) {
    stopTransformEditing();
  }

  _selectedBodyName = bodyName;

  if (_selectedBodyName !== null) {
    applyBodyHighlight(_selectedBodyName, true);
  }

  updateSelectedBodyLabel();
  updateJointBodyListSelection();
  renderJointEditorCard();
  renderMergeEditorCard();
}

function applyBodyHighlight(bodyName, isSelected) {
  var bodyEntry = _mjBodyMap[bodyName];
  if (!bodyEntry) {
    throw new Error('Cannot highlight unknown body ' + bodyName);
  }

  bodyEntry.meshes.forEach(function(mesh) {
    var materials = getMeshMaterials(mesh);
    var states = mesh.userData.materialState;
    if (!Array.isArray(states) || states.length !== materials.length) {
      throw new Error('Material state mismatch for body ' + bodyName);
    }

    materials.forEach(function(material, index) {
      var originalState = states[index];
      if (isSelected) {
        material.emissive.copy(_selectionEmissiveColor);
        material.emissiveIntensity = 0.7;
        return;
      }
      material.emissive.copy(originalState.emissive);
      material.emissiveIntensity = originalState.emissiveIntensity;
    });
  });
}

function updateSelectedBodyLabel() {
  var selectedText = _selectedBodyName === null ? 'none' : _selectedBodyName;
  document.getElementById('selected-body-text').textContent = 'Selected: ' + selectedText;
}

function buildJointPanel(manifestJoints) {
  if (!Array.isArray(manifestJoints)) {
    throw new Error('Joint panel requires manifest.joints to be an array');
  }

  var panel = document.getElementById('joint-panel');
  var panelBody = document.getElementById('joint-panel-body');
  panelBody.innerHTML = '';
  _jointSliderMap = Object.create(null);
  _jointBodyListItemMap = Object.create(null);

  var fragment = document.createDocumentFragment();
  var bodySection = document.createElement('div');
  bodySection.className = 'panel-section';

  var bodySectionTitle = document.createElement('div');
  bodySectionTitle.className = 'panel-section-title';
  bodySectionTitle.textContent = 'Bodies';
  bodySection.appendChild(bodySectionTitle);

  var bodyList = document.createElement('div');
  bodyList.id = 'joint-body-list';

  normalizeMergeSelection();
  getJointPanelBodies().forEach(function(body) {
    if (!Object.prototype.hasOwnProperty.call(_mjBodyMap, body.name)) {
      throw new Error('Joint panel cannot find body metadata for ' + body.name);
    }

    var bodyRow = document.createElement('div');
    bodyRow.className = 'joint-body-row';

    var mergeToggle = document.createElement('input');
    mergeToggle.type = 'checkbox';
    mergeToggle.className = 'joint-body-merge-toggle';
    mergeToggle.checked = _uiState.mergeSelection.has(body.name);
    mergeToggle.title = 'Select ' + body.name + ' for merge';
    mergeToggle.addEventListener('click', function(event) {
      event.stopPropagation();
    });
    mergeToggle.addEventListener('change', function(event) {
      try {
        handleMergeSelectionToggle(body.name, event.currentTarget.checked);
      } catch (err) {
        showError(String(err && err.message ? err.message : err));
      }
    });
    bodyRow.appendChild(mergeToggle);

    var bodyButton = document.createElement('button');
    bodyButton.type = 'button';
    bodyButton.className = 'joint-body-button';
    bodyButton.dataset.body = body.name;
    bodyButton.addEventListener('click', handleJointBodyListClick);

    var bodyNameLabel = document.createElement('div');
    bodyNameLabel.className = 'joint-body-name';
    bodyNameLabel.textContent = body.name;
    bodyButton.appendChild(bodyNameLabel);

    var bodyMetaLabel = document.createElement('div');
    bodyMetaLabel.className = 'joint-body-meta';
    bodyMetaLabel.textContent = getBodyJointMetaText(body.name);
    bodyButton.appendChild(bodyMetaLabel);

    _jointBodyListItemMap[body.name] = bodyButton;
    bodyRow.appendChild(bodyButton);
    bodyList.appendChild(bodyRow);
  });

  bodySection.appendChild(bodyList);
  fragment.appendChild(bodySection);

  var sliderSection = document.createElement('div');
  sliderSection.className = 'panel-section';

  var sliderSectionTitle = document.createElement('div');
  sliderSectionTitle.className = 'panel-section-title';
  sliderSectionTitle.textContent = 'Joint Controls';
  sliderSection.appendChild(sliderSectionTitle);

  if (manifestJoints.length === 0) {
    var sliderEmptyState = document.createElement('div');
    sliderEmptyState.id = 'joint-panel-empty';
    sliderEmptyState.textContent = 'No previewable hinge or slide joints were found in this manifest.';
    sliderSection.appendChild(sliderEmptyState);
  } else {
    manifestJoints.forEach(function(joint) {
      var jointData = getValidatedJointData(joint);
      if (!Object.prototype.hasOwnProperty.call(_mjJointMap, joint.name)) {
        throw new Error('Joint panel cannot find preview metadata for joint ' + joint.name);
      }

      var row = document.createElement('div');
      row.className = 'joint-slider-row';

      var topRow = document.createElement('div');
      topRow.className = 'joint-slider-top';

      var titleWrap = document.createElement('div');
      titleWrap.className = 'joint-slider-title';

      var nameLabel = document.createElement('div');
      nameLabel.className = 'joint-slider-name';
      nameLabel.textContent = joint.name;
      titleWrap.appendChild(nameLabel);

      var typeBadge = document.createElement('span');
      typeBadge.className = 'joint-type-badge ' + joint.type;
      typeBadge.textContent = joint.type;
      titleWrap.appendChild(typeBadge);

      var valueLabel = document.createElement('div');
      valueLabel.className = 'joint-slider-value';

      topRow.appendChild(titleWrap);
      topRow.appendChild(valueLabel);
      row.appendChild(topRow);

      var rangeLabel = document.createElement('div');
      rangeLabel.className = 'joint-slider-range';
      rangeLabel.textContent = formatJointRangeLabel(joint.type, jointData.range[0], jointData.range[1]);
      row.appendChild(rangeLabel);

      var slider = document.createElement('input');
      slider.type = 'range';
      slider.className = 'joint-slider';
      slider.min = String(joint.range[0]);
      slider.max = String(joint.range[1]);
      slider.value = String(joint.default);
      slider.step = joint.type === 'hinge' ? '0.01' : slideSliderStep(joint.range);
      slider.dataset.joint = joint.name;
      slider.addEventListener('input', handleJointSliderInput);
      row.appendChild(slider);

      _jointSliderMap[joint.name] = {
        input: slider,
        valueLabel: valueLabel,
        typeBadge: typeBadge,
        rangeLabel: rangeLabel
      };

      updateJointSliderValueLabel(joint.name, jointData.defaultVal);
      sliderSection.appendChild(row);
    });
  }

  fragment.appendChild(sliderSection);

  var editorSection = document.createElement('div');
  editorSection.className = 'panel-section';

  var editorSectionTitle = document.createElement('div');
  editorSectionTitle.className = 'panel-section-title';
  editorSectionTitle.textContent = 'Joint Editor';
  editorSection.appendChild(editorSectionTitle);

  var editorHost = document.createElement('div');
  editorHost.id = 'joint-editor-card-host';
  editorSection.appendChild(editorHost);
  fragment.appendChild(editorSection);

  var mergeSection = document.createElement('div');
  mergeSection.className = 'panel-section';

  var mergeSectionTitle = document.createElement('div');
  mergeSectionTitle.className = 'panel-section-title';
  mergeSectionTitle.textContent = 'Merge';
  mergeSection.appendChild(mergeSectionTitle);

  var mergeHost = document.createElement('div');
  mergeHost.id = 'merge-editor-card-host';
  mergeSection.appendChild(mergeHost);
  fragment.appendChild(mergeSection);

  panelBody.appendChild(fragment);
  panel.hidden = false;
  updateJointBodyListSelection();
  renderJointEditorCard();
  renderMergeEditorCard();
}

function applyManifestJointDefaults(manifestJoints) {
  if (!Array.isArray(manifestJoints)) {
    throw new Error('Joint defaults require manifest.joints to be an array');
  }

  manifestJoints.forEach(function(joint) {
    if (!Object.prototype.hasOwnProperty.call(_jointSliderMap, joint.name)) {
      throw new Error('Missing slider UI for joint ' + joint.name);
    }
    _jointSliderMap[joint.name].input.value = String(joint.default);
    applyJointPreview(joint.name, joint.default);
    updateJointSliderValueLabel(joint.name, joint.default);
  });
}

function handleJointSliderInput(event) {
  var slider = event.target;
  var jointName = slider.dataset.joint;
  if (typeof jointName !== 'string' || jointName.length === 0) {
    throw new Error('Joint slider is missing a valid joint name');
  }

  var value = Number(slider.value);
  if (Number.isFinite(value) === false) {
    throw new Error('Joint slider value must be finite for joint ' + jointName);
  }

  applyJointPreview(jointName, value);
  updateJointSliderValueLabel(jointName, value);
}

function handleJointBodyListClick(event) {
  var button = event.currentTarget;
  if (!button || !button.dataset || typeof button.dataset.body !== 'string' || button.dataset.body.length === 0) {
    throw new Error('Joint body list item is missing a valid body name');
  }
  setSelectedBody(button.dataset.body);
}

function handleMergeSelectionToggle(bodyName, isSelected) {
  normalizeMergeSelection();
  if (isSelected) {
    _uiState.mergeSelection.add(bodyName);
  } else {
    _uiState.mergeSelection.delete(bodyName);
  }
  renderMergeEditorCard();
}

function getJointPanelBodies() {
  if (_draftManifest !== null && Array.isArray(_draftManifest.bodies)) {
    return _draftManifest.bodies;
  }
  return Object.keys(_mjBodyMap).map(function(bodyName) {
    return { name: bodyName };
  });
}

function getBodyJointMetaText(bodyName) {
  var joint = getOnlyJointForBody(bodyName);
  if (joint === null) {
    return 'no joint';
  }
  return joint.name + ' · ' + joint.type;
}

function getDisplayedJointEditorState(joint) {
  if (
    _uiState.activeJointName === joint.name &&
    _uiState.activeJointEditMode !== null &&
    typeof _uiState.activeJointTempType === 'string' &&
    Array.isArray(_uiState.activeJointTempRange)
  ) {
    return {
      type: _uiState.activeJointTempType,
      range: deepCloneJson(_uiState.activeJointTempRange)
    };
  }
  return {
    type: joint.type,
    range: deepCloneJson(joint.range)
  };
}

function getDisplayedAnchorEditorState(joint) {
  if (
    _uiState.activeJointName === joint.name &&
    _uiState.activeJointEditMode === 'anchor' &&
    Array.isArray(_uiState.activeJointTempAnchor)
  ) {
    return deepCloneJson(_uiState.activeJointTempAnchor);
  }
  return deepCloneJson(joint.anchor);
}

function getDisplayedAxisEditorState(joint) {
  if (
    _uiState.activeJointName === joint.name &&
    _uiState.activeJointEditMode === 'axis' &&
    Array.isArray(_uiState.activeJointTempAxis)
  ) {
    return deepCloneJson(_uiState.activeJointTempAxis);
  }
  return deepCloneJson(joint.axis);
}

function normalizeMergeSelection() {
  if (!(_uiState.mergeSelection instanceof Set)) {
    _uiState.mergeSelection = new Set();
  }
  if (_draftManifest === null || !Array.isArray(_draftManifest.bodies)) {
    _uiState.mergeSelection.clear();
    return;
  }
  var validBodyNames = collectDraftBodyNameSet();
  Array.from(_uiState.mergeSelection).forEach(function(bodyName) {
    if (!Object.prototype.hasOwnProperty.call(validBodyNames, bodyName)) {
      _uiState.mergeSelection.delete(bodyName);
    }
  });
}

function getOrderedMergeSelectionBodies() {
  normalizeMergeSelection();
  if (_draftManifest === null || !Array.isArray(_draftManifest.bodies)) {
    throw new Error('Draft manifest bodies are not initialized');
  }
  return _draftManifest.bodies.filter(function(body) {
    return _uiState.mergeSelection.has(body.name);
  });
}

function getDraftJointsForBody(bodyName) {
  if (_draftManifest === null || !Array.isArray(_draftManifest.joints)) {
    throw new Error('Draft manifest joints are not initialized');
  }
  return _draftManifest.joints.filter(function(joint) {
    return joint.body === bodyName;
  });
}

function getMergeEligibility() {
  var selectedBodies = getOrderedMergeSelectionBodies();
  if (selectedBodies.length < 2) {
    return {
      ok: false,
      message: 'Select at least two sibling leaf bodies to merge.',
      bodies: selectedBodies,
      selectedJoints: [],
      retainedJoint: null,
      discardedJoints: [],
      commonParent: null
    };
  }

  var commonParent = selectedBodies[0].parent;
  var sourceJoints = [];
  for (var i = 0; i < selectedBodies.length; i++) {
    var body = selectedBodies[i];
    if (!isLeafDraftBody(body.name)) {
      return {
        ok: false,
        message: 'Only leaf bodies can be merged: ' + body.name,
        bodies: selectedBodies,
        selectedJoints: [],
        retainedJoint: null,
        discardedJoints: [],
        commonParent: commonParent
      };
    }
    if (body.parent !== commonParent) {
      return {
        ok: false,
        message: 'Merged bodies must share the same parent.',
        bodies: selectedBodies,
        selectedJoints: [],
        retainedJoint: null,
        discardedJoints: [],
        commonParent: commonParent
      };
    }
    var bodyJoints = getDraftJointsForBody(body.name);
    if (bodyJoints.length > 1) {
      return {
        ok: false,
        message: 'Only one joint per selected body is supported: ' + body.name,
        bodies: selectedBodies,
        selectedJoints: [],
        retainedJoint: null,
        discardedJoints: [],
        commonParent: commonParent
      };
    }
    if (bodyJoints.length === 1) {
      sourceJoints.push(bodyJoints[0]);
    }
  }
  var retainedJoint = sourceJoints.length > 0 ? sourceJoints[0] : null;
  var discardedJoints = retainedJoint === null ? [] : sourceJoints.slice(1);

  return {
    ok: true,
    message: retainedJoint === null
      ? 'Ready to merge ' + selectedBodies.length + ' sibling leaf bodies.'
      : (
        'Ready to merge ' + selectedBodies.length + ' sibling leaf bodies. ' +
        'Retaining joint ' + retainedJoint.name +
        (discardedJoints.length > 0 ? '; discarding ' + discardedJoints.map(function(joint) { return joint.name; }).join(', ') + '.' : '.')
      ),
    bodies: selectedBodies,
    selectedJoints: sourceJoints,
    retainedJoint: retainedJoint,
    discardedJoints: discardedJoints,
    commonParent: commonParent
  };
}

function getMergeTargetCandidates() {
  normalizeMergeSelection();
  if (_draftManifest === null || !Array.isArray(_draftManifest.bodies)) {
    throw new Error('Draft manifest bodies are not initialized');
  }
  return _draftManifest.bodies.filter(function(body) {
    return !_uiState.mergeSelection.has(body.name);
  });
}

function getDefaultMergeTargetName(candidates) {
  if (
    _selectedBodyName !== null &&
    !_uiState.mergeSelection.has(_selectedBodyName) &&
    candidates.some(function(body) { return body.name === _selectedBodyName; })
  ) {
    return _selectedBodyName;
  }
  return candidates.length > 0 ? candidates[0].name : '';
}

function getMergeIntoTargetEligibility(targetBodyName) {
  var selectedBodies = getOrderedMergeSelectionBodies();
  var targetBody = targetBodyName ? getDraftBodyByName(targetBodyName) : null;

function buildAnchorDragPlane(anchorWorld, axisWorld) {

    planeNormal = cameraForward.projectOnPlane(axisWorld);
    if (planeNormal.lengthSq() < 1e-8 && cameraRight.lengthSq() > 1e-8) {
      planeNormal = cameraRight.clone().projectOnPlane(axisWorld);
    }
    if (planeNormal.lengthSq() < 1e-8) {
      planeNormal = cameraUp.projectOnPlane(axisWorld);
    }
    if (planeNormal.lengthSq() < 1e-8) {
      planeNormal = new THREE.Vector3(1, 0, 0).projectOnPlane(axisWorld);
    }
    if (planeNormal.lengthSq() < 1e-8) {
      planeNormal = new THREE.Vector3(0, 1, 0).projectOnPlane(axisWorld);
    }

function solveRayAxisClosestDistance(ray, axisOriginWorld, axisDirectionWorld) {
  var rayDirection = ray.direction.clone().normalize();
  var axisDirection = axisDirectionWorld.clone().normalize();
  var offset = ray.origin.clone().sub(axisOriginWorld);
  var a = rayDirection.dot(rayDirection);
  var b = rayDirection.dot(axisDirection);
  var c = axisDirection.dot(axisDirection);
  var d = rayDirection.dot(offset);
  var e = axisDirection.dot(offset);
  var denominator = a * c - b * b;

  if (Math.abs(denominator) < 1e-8) {
    return NaN;
  }

  return (a * e - b * d) / denominator;
}

function buildAnchorAxisScreenScale(anchorWorld, axisWorld) {
  var anchorScreen = anchorWorld.clone().project(camera);
  var axisEndScreen = anchorWorld.clone().add(axisWorld.clone()).project(camera);
  var axisScreenVector = axisEndScreen.sub(anchorScreen);
  var axisScreenLength = axisScreenVector.length();
  if (axisScreenLength < 1e-4) {
    var cameraQuaternion = camera.getWorldQuaternion(new THREE.Quaternion());
    var cameraRightWorld = new THREE.Vector3(1, 0, 0).applyQuaternion(cameraQuaternion).normalize();
    var cameraUpWorld = new THREE.Vector3(0, 1, 0).applyQuaternion(cameraQuaternion).normalize();
    var useVerticalFallback = Math.abs(axisWorld.dot(cameraUpWorld)) <= Math.abs(axisWorld.dot(cameraRightWorld));

    if (camera.isPerspectiveCamera === true) {
      var anchorCamera = anchorWorld.clone().applyMatrix4(camera.matrixWorldInverse);
      var depth = Math.max(Math.abs(anchorCamera.z), 1e-3);
      var verticalUnitsPerNdc = depth * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5));
      var horizontalUnitsPerNdc = verticalUnitsPerNdc * camera.aspect;
      return {
        direction: new THREE.Vector2(useVerticalFallback ? 0 : 1, useVerticalFallback ? 1 : 0),
        unitsPerNdc: Math.max(useVerticalFallback ? verticalUnitsPerNdc : horizontalUnitsPerNdc, 1e-4)
      };
    }

    if (camera.isOrthographicCamera === true) {
      var verticalOrthoUnitsPerNdc = (camera.top - camera.bottom) * 0.5 / camera.zoom;
      var horizontalOrthoUnitsPerNdc = (camera.right - camera.left) * 0.5 / camera.zoom;
      return {
        direction: new THREE.Vector2(useVerticalFallback ? 0 : 1, useVerticalFallback ? 1 : 0),
        unitsPerNdc: Math.max(useVerticalFallback ? verticalOrthoUnitsPerNdc : horizontalOrthoUnitsPerNdc, 1e-4)

    }

    return {
      direction: new THREE.Vector2(useVerticalFallback ? 0 : 1, useVerticalFallback ? 1 : 0),
      unitsPerNdc: 1

    direction: axisScreenVector.normalize(),
    unitsPerNdc: axisScreenLength

    throw new Error('Joint helper node is missing for joint ' + jointName);
  }

  var parent = previewEntry.helperNode.parent;
  var previousHelperNode = previewEntry.helperNode;
  var nextHelperNode = createJointHelperGroup(jointState);
  parent.remove(previousHelperNode);
  disposeGroup(previousHelperNode);
  parent.add(nextHelperNode);
  previewEntry.helperNode = nextHelperNode;
}

function syncJointSliderUi(jointName, jointType, jointRange, previewValue) {
  if (!Object.prototype.hasOwnProperty.call(_jointSliderMap, jointName)) {
    throw new Error('Joint slider UI is missing for joint ' + jointName);
  }
  var sliderEntry = _jointSliderMap[jointName];
  sliderEntry.input.min = String(jointRange[0]);
  sliderEntry.input.max = String(jointRange[1]);
  sliderEntry.input.step = jointType === 'hinge' ? '0.01' : slideSliderStep(jointRange);
  sliderEntry.input.value = String(previewValue);
  sliderEntry.typeBadge.className = 'joint-type-badge ' + jointType;
  sliderEntry.typeBadge.textContent = jointType;
  sliderEntry.rangeLabel.textContent = formatJointRangeLabel(jointType, jointRange[0], jointRange[1]);
  updateJointSliderValueLabel(jointName, previewValue);
}

function applyJointStateToScene(jointName, jointState, previewValue) {
  var previewEntry = getJointPreviewEntry(jointName);
  var jointData = getValidatedJointData(jointState);
  if (previewValue < jointData.range[0] || previewValue > jointData.range[1]) {
    throw new Error('Current joint preview value must remain inside the edited range');
  }

  previewEntry.type = jointState.type;
  previewEntry.axis.copy(jointData.axis);
  previewEntry.range = [jointData.range[0], jointData.range[1]];
  previewEntry.defaultVal = jointData.defaultVal;
  previewEntry.restPosition.copy(jointData.anchor);
  previewEntry.restQuaternion.identity();
  // Preserve the body-origin offset so live anchor edits move the whole joint subtree.
  previewEntry.meshNodes.forEach(function(meshNode) {
    meshNode.position.copy(previewEntry.bodyLocalOriginOffset);
    meshNode.quaternion.identity();
  });

  replaceJointHelperNode(jointName, buildEditableJointState(
    jointName,
    vector3ToArray(jointData.anchor),
    vector3ToArray(jointData.axis),
    jointState.type,
    jointData.range,
    jointData.defaultVal
  ));
  applyJointPreview(jointName, previewValue);
  syncJointSliderUi(jointName, jointState.type, jointData.range, previewValue);
  updateJointBodyMetaText(previewEntry.bodyName);
}

function getActiveJointTemporaryState() {
  if (_uiState.activeJointName === null) {
    return null;
  }
  if (
    typeof _uiState.activeJointTempType !== 'string' ||
    !Array.isArray(_uiState.activeJointTempRange) ||
    !Array.isArray(_uiState.activeJointTempAnchor) ||
    !Array.isArray(_uiState.activeJointTempAxis)
  ) {
    throw new Error('Active joint temp state is incomplete');
  }
  return {
    type: _uiState.activeJointTempType,
    range: deepCloneJson(_uiState.activeJointTempRange),
    anchor: deepCloneJson(_uiState.activeJointTempAnchor),
    axis: deepCloneJson(_uiState.activeJointTempAxis)
  };
}

function syncActiveJointHandleFromTempState() {
  if (_uiState.activeJointHandle === null) {
    throw new Error('Active joint handle is missing');
  }
  var tempState = getActiveJointTemporaryState();
  if (tempState === null) {
    throw new Error('No temporary joint edit is active');
  }
  _uiState.activeJointHandle.position.copy(readVector3(tempState.anchor, 'Active joint temp anchor'));
  _uiState.activeJointHandle.quaternion.copy(
    new THREE.Quaternion().setFromUnitVectors(
      new THREE.Vector3(0, 0, 1),
      readVector3(tempState.axis, 'Active joint temp axis').normalize()
    )
  );
}

function applyActiveJointTemporaryStateToScene() {
  if (_uiState.activeJointName === null) {
    return;
  }
  var joint = getDraftJointByName(_uiState.activeJointName);
  if (joint === null) {
    throw new Error('Active joint edit target is missing from draft manifest');
  }
  var tempState = getActiveJointTemporaryState();
  if (tempState === null) {
    throw new Error('No temporary joint edit is active');
  }
  applyJointStateToScene(
    joint.name,
    buildEditableJointState(joint.name, tempState.anchor, tempState.axis, tempState.type, tempState.range, joint.default),
    getJointCurrentPreviewValue(joint.name)
  );
}

function restoreCommittedJointScene(jointName) {
  var joint = getDraftJointByName(jointName);
  if (joint === null) {
    throw new Error('Cannot restore committed joint state for missing joint ' + jointName);
  }
  applyJointStateToScene(
    joint.name,
    buildEditableJointState(joint.name, joint.anchor, joint.axis, joint.type, joint.range, joint.default),
    getJointCurrentPreviewValue(joint.name)
  );
}

function createJointEditorEmptyState(message) {
  var emptyState = document.createElement('div');
  emptyState.className = 'joint-editor-copy';
