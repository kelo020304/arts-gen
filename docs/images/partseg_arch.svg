    <polygon points="0,16 32,32 32,68 0,52" fill="#f0c96d" stroke="#d7b85a" stroke-width="1.5"/>
    <polygon points="64,16 32,32 32,68 64,52" fill="#e6b85e" stroke="#d7b85a" stroke-width="1.5"/>
    <path d="M16 24 L48 8 M16 60 L16 24 M48 60 L48 24" stroke="#fff2bd" stroke-width="1.2" opacity="0.8"/>
