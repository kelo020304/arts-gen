  <text x="443" y="224" text-anchor="middle" class="title">VLM</text>
  <text x="443" y="254" text-anchor="middle" class="subtitle">semantic parser</text>
  <text x="443" y="314" text-anchor="middle" class="small">multi-view renders</text>
  <text x="443" y="351" text-anchor="middle" class="tiny">single semantic source</text>
  <text x="443" y="372" text-anchor="middle" class="tiny">for SS and seg prompts</text>

