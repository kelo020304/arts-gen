  <text x="713" y="327" text-anchor="middle" class="title">SS Flow</text>
  <use href="#icon-fire" x="773" y="304" width="24" height="24"/>
  <text x="722" y="351" text-anchor="middle" class="tiny">multi-view concat</text>
