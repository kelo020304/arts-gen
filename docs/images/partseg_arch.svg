<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="21in" height="9in" viewBox="0 0 2100 900" role="img" aria-labelledby="title desc">
  <title id="title">PartSeg Method Overview</title>
  <desc id="desc">Clean two-panel method overview figure for promptable part segmentation.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 Z" fill="#5b6472"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 Z" fill="#9aa4b2"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 Z" fill="#d75a4a"/>
    </marker>
    <filter id="shadow" x="-5%" y="-8%" width="110%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="voxelTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4c7"/>
      <stop offset="1" stop-color="#f4d889"/>
    </linearGradient>
    <symbol id="icon-snow" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="3" fill="#9bd0f5"/>
      <path d="M14 2 V26 M4 7 L24 21 M24 7 L4 21" stroke="#83c3f0" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M9 4 L14 9 L19 4 M9 24 L14 19 L19 24 M2 14 H26" stroke="#b7def7" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-fire" viewBox="0 0 28 28">
      <path d="M15 2 C19 8 23 11 23 17 C23 23 19 27 14 27 C8 27 4 23 4 18 C4 14 7 11 10 8 C10 12 12 14 14 15 C15 11 13 8 15 2 Z" fill="#ff8a24"/>
      <path d="M14 13 C17 17 18 20 15 23 C13 25 9 23 9 19 C9 17 11 15 14 13 Z" fill="#ffd27a"/>
    </symbol>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #fbfcfe; stroke: #d7dee9; stroke-width: 2; rx: 24; }
      .panel-title { font: 800 30px "Inter", "Noto Sans", Arial, sans-serif; fill: #172033; letter-spacing: 0; }
      .card { stroke: #bcc8d7; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .blue { fill: #eaf4ff; }
      .lav { fill: #f1edff; }
      .green { fill: #eaf8f0; }
      .yellow { fill: #fff6d9; }
      .pink { fill: #fff0f3; }
      .gray { fill: #f2f5f8; }
      .orange { fill: #ffe7c7; stroke: #e0a35c; }
      .new-card { fill: #fff5f3; stroke: #e46655; stroke-width: 2.5; }
      .train-box { fill: #fbfbfc; stroke: #a8b1bf; stroke-width: 2; stroke-dasharray: 9 7; rx: 18; }
      .title { font: 800 23px "Inter", "Noto Sans", Arial, sans-serif; fill: #202a3a; letter-spacing: 0; }
      .med { font: 800 19px "Inter", "Noto Sans", Arial, sans-serif; fill: #202a3a; letter-spacing: 0; }
      .subtitle { font: 600 17px "Inter", "Noto Sans", Arial, sans-serif; fill: #697486; letter-spacing: 0; }
      .small { font: 600 15px "Inter", "Noto Sans", Arial, sans-serif; fill: #697486; letter-spacing: 0; }
      .tiny { font: 600 13px "Inter", "Noto Sans", Arial, sans-serif; fill: #7c8796; letter-spacing: 0; }
      .arrow { fill: none; stroke: #5b6472; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #9aa4b2; stroke-width: 2; marker-end: url(#arrow-soft); }
      .arrow-faded { fill: none; stroke: #a8b1bf; stroke-width: 2; marker-end: url(#arrow-soft); opacity: 0.55; }
      .arrow-red { fill: none; stroke: #d75a4a; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow-red); }
      .badge { fill: #dc2f2f; rx: 7; }
      .badge-text { font: 800 13px "Inter", Arial, sans-serif; fill: #fff; letter-spacing: 0; }
      .legend { font: 600 15px "Inter", "Noto Sans", Arial, sans-serif; fill: #6b7687; }
    </style>
