      <rect x="13" y="14" width="38" height="28" rx="4" fill="#c99a62"/>
      <line x1="32" y1="14" x2="32" y2="42" stroke="#f7e5cc" stroke-width="2"/>
    </g>
    <g transform="translate(78 65)">
      <rect x="0" y="0" width="64" height="52" rx="7" fill="#f4def0" stroke="#c7a2c8" stroke-width="2"/>
      <rect x="14" y="12" width="36" height="30" rx="4" fill="#a68bb6"/>
      <circle cx="26" cy="28" r="3" fill="#f8ecf8"/>
      <circle cx="38" cy="28" r="3" fill="#f8ecf8"/>
    </g>
  </g>

