<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="800" viewBox="0 0 1040 800" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="1040" height="800" fill="#FAFAF7"/>

<text x="520" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#2C2C2A">Phase 3a · Part Predictor Training (basic version)</text>
<text x="520" y="62" text-anchor="middle" font-size="14" fill="#5F5E5A">only Part Predictor updates · Stage 2/4 frozen · supervised by GT part labels via Hungarian matching</text>

<!-- ======= LEFT COLUMN: inputs ======= -->
<g>
<rect x="40" y="100" width="220" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="150" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Stage 2 + Stage 4 (frozen)</text>
<text x="150" y="146" text-anchor="middle" font-size="11" fill="#0F6E56">active voxels V</text>
<text x="150" y="162" text-anchor="middle" font-size="11" fill="#0F6E56">structured latent z_slat</text>
</g>

<g>
<rect x="40" y="220" width="220" height="72" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text x="150" y="246" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">VLM / GT prior</text>
<text x="150" y="264" text-anchor="middle" font-size="11" fill="#534AB7">K part queries</text>
<text x="150" y="280" text-anchor="middle" font-size="11" fill="#534AB7">class embeddings (init)</text>
</g>

<g>
<rect x="40" y="540" width="220" height="72" rx="10" fill="#FAEEDA" stroke="#854F0B"/>
<text x="150" y="566" text-anchor="middle" font-size="14" font-weight="600" fill="#633806">GT part labels</text>
<text x="150" y="584" text-anchor="middle" font-size="11" fill="#854F0B">per-voxel assignment</text>
<text x="150" y="600" text-anchor="middle" font-size="11" fill="#854F0B">+ GT class per part</text>
</g>

<!-- ======= MIDDLE: Part Predictor ======= -->
<g>
<rect x="360" y="100" width="380" height="520" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="2"/>
<text x="550" y="128" text-anchor="middle" font-size="17" font-weight="600" fill="#712B13">Part Predictor  ★ trainable</text>
<text x="550" y="148" text-anchor="middle" font-size="12" fill="#993C1D">Query-based Transformer decoder</text>

<!-- voxel feature head -->
<rect x="380" y="170" width="340" height="60" rx="6" fill="#FFFFFF" stroke="#993C1D"/>
<text x="550" y="193" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">voxel feature head</text>
<text x="550" y="211" text-anchor="middle" font-size="11" fill="#993C1D">z_slat → F ∈ ℝ^(N×d)</text>

<!-- query init -->
<rect x="380" y="248" width="340" height="60" rx="6" fill="#FFFFFF" stroke="#993C1D"/>
<text x="550" y="271" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">query initialization</text>
<text x="550" y="289" text-anchor="middle" font-size="11" fill="#993C1D">Q ∈ ℝ^(K×d) ← VLM class embeddings</text>

<!-- transformer decoder -->
<rect x="380" y="326" width="340" height="110" rx="6" fill="#FFFFFF" stroke="#993C1D"/>
<text x="550" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Transformer Decoder × L</text>
<text x="550" y="370" text-anchor="middle" font-size="11" fill="#993C1D">self-attention over K queries</text>
<text x="550" y="386" text-anchor="middle" font-size="11" fill="#993C1D">cross-attention: Q ← F</text>
<text x="550" y="402" text-anchor="middle" font-size="11" fill="#993C1D">FFN</text>
<text x="550" y="422" text-anchor="middle" font-size="11" fill="#5F5E5A">Q → Q' (refined part queries)</text>

<!-- prediction heads -->
<rect x="380" y="454" width="164" height="146" rx="6" fill="#FFFFFF" stroke="#993C1D"/>
<text x="462" y="478" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">mask head</text>
<text x="462" y="500" text-anchor="middle" font-size="11" fill="#993C1D">M = σ(Q' · Fᵀ)</text>
<text x="462" y="518" text-anchor="middle" font-size="11" fill="#993C1D">∈ ℝ^(K×N)</text>
<text x="462" y="544" text-anchor="middle" font-size="11" fill="#5F5E5A">soft per-voxel</text>
<text x="462" y="560" text-anchor="middle" font-size="11" fill="#5F5E5A">masks</text>

<rect x="556" y="454" width="164" height="146" rx="6" fill="#FFFFFF" stroke="#993C1D"/>
<text x="638" y="478" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">class head</text>
<text x="638" y="500" text-anchor="middle" font-size="11" fill="#993C1D">c_k = MLP(Q'_k)</text>
<text x="638" y="518" text-anchor="middle" font-size="11" fill="#993C1D">∈ ℝ^(K×C)</text>
<text x="638" y="544" text-anchor="middle" font-size="11" fill="#5F5E5A">per-query</text>
<text x="638" y="560" text-anchor="middle" font-size="11" fill="#5F5E5A">class logits</text>
</g>

<!-- ======= RIGHT COLUMN: matching + losses ======= -->
<g>
<rect x="800" y="130" width="200" height="78" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="1.5"/>
<text x="900" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#72243E">Hungarian matching</text>
<text x="900" y="174" text-anchor="middle" font-size="11" fill="#993556">cost = λ_m·mask + λ_c·class</text>
<text x="900" y="190" text-anchor="middle" font-size="11" fill="#993556">K pred ↔ K* GT parts</text>
</g>

<g>
<rect x="800" y="240" width="200" height="68" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
<text x="900" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#501313">ℒ_mask</text>
<text x="900" y="284" text-anchor="middle" font-size="11" fill="#791F1F">BCE + Dice</text>
<text x="900" y="298" text-anchor="middle" font-size="11" fill="#791F1F">on matched pairs</text>
</g>

<g>
<rect x="800" y="340" width="200" height="68" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
<text x="900" y="366" text-anchor="middle" font-size="14" font-weight="600" fill="#501313">ℒ_class</text>
<text x="900" y="384" text-anchor="middle" font-size="11" fill="#791F1F">Cross-entropy</text>
<text x="900" y="398" text-anchor="middle" font-size="11" fill="#791F1F">(incl. "no object")</text>
</g>

<g>
<rect x="800" y="440" width="200" height="72" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="2"/>
<text x="900" y="466" text-anchor="middle" font-size="14" font-weight="600" fill="#501313">ℒ_part (total)</text>
<text x="900" y="484" text-anchor="middle" font-size="11" fill="#791F1F">= ℒ_mask + ℒ_class</text>
<text x="900" y="500" text-anchor="middle" font-size="11" fill="#791F1F">(+ optional boundary)</text>
</g>

<!-- ======= ORTHOGONAL ARROWS ======= -->
<!-- Stage 2+4 → voxel feature head (horizontal) -->
<path d="M260 200 L380 200" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="290" y="192" font-size="11" fill="#085041">z_slat</text>

<!-- VLM → query init (horizontal) -->
<path d="M260 278 L380 278" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
<text x="290" y="270" font-size="11" fill="#3C3489">Q_init</text>

<!-- GT part labels → Hungarian (up right lane) -->
<path d="M260 576 L320 576 L320 169 L800 169" fill="none" stroke="#854F0B" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="268" y="160" font-size="11" fill="#633806">GT parts</text>

<!-- mask head → L_mask (right then up a little) -->
<path d="M544 510 L762 510 L762 274 L800 274" fill="none" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- class head → L_class (right then down a little) -->
<path d="M720 510 L780 510 L780 374 L800 374" fill="none" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Hungarian → L_mask and L_class (vertical chain) -->
<path d="M900 208 L900 240" fill="none" stroke="#993556" stroke-width="1.3" marker-end="url(#arr)"/>
<path d="M900 308 L900 340" fill="none" stroke="#993556" stroke-width="1.3" marker-end="url(#arr)"/>
<path d="M900 408 L900 440" fill="none" stroke="#993556" stroke-width="1.3" marker-end="url(#arr)"/>

<!-- Gradient back (orthogonal, along bottom) -->
<path d="M800 476 L770 476 L770 640 L550 640 L550 622" fill="none" stroke="#A32D2D" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="580" y="655" font-size="12" fill="#A32D2D">∇ → Part Predictor only</text>

<!-- ======= legend ======= -->
<g transform="translate(40, 710)">
<text x="0" y="0" font-size="14" font-weight="600" fill="#2C2C2A">Legend</text>

<rect x="0" y="14" width="18" height="14" rx="3" fill="#FAECE7" stroke="#993C1D"/>
<text x="26" y="26" font-size="12" fill="#712B13">trainable (Part Predictor)</text>

<rect x="200" y="14" width="18" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="226" y="26" font-size="12" fill="#085041">frozen (Stage 2/4)</text>

<rect x="370" y="14" width="18" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B"/>
<text x="396" y="26" font-size="12" fill="#633806">GT supervision</text>

<rect x="510" y="14" width="18" height="14" rx="3" fill="#FCEBEB" stroke="#A32D2D"/>
<text x="536" y="26" font-size="12" fill="#501313">loss</text>

<rect x="580" y="14" width="18" height="14" rx="3" fill="#FBEAF0" stroke="#993556"/>
<text x="606" y="26" font-size="12" fill="#72243E">matching</text>
</g>

<text x="40" y="770" font-size="11" fill="#5F5E5A">Variable K: # part queries decided per-sample by VLM / GT. Hungarian matching handles permutation invariance; unmatched queries → "no object" class.</text>
</svg>
