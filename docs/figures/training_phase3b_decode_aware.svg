<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="960" viewBox="0 0 1040 960" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="1040" height="960" fill="#FAFAF7"/>

<text x="520" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#2C2C2A">Phase 3b · Decode-aware Part Predictor Training  ★ core contribution</text>
<text x="520" y="62" text-anchor="middle" font-size="14" fill="#5F5E5A">gradient flows through frozen Stage 3 decoder back to Part Predictor</text>

<!-- ===== Top row: upstream frozen + Part Predictor ===== -->
<g>
<rect x="60" y="100" width="260" height="76" rx="10" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="190" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Stage 2 + Stage 4 (frozen)</text>
<text x="190" y="148" text-anchor="middle" font-size="11" fill="#0F6E56">active voxels V</text>
<text x="190" y="164" text-anchor="middle" font-size="11" fill="#0F6E56">structured latent z_slat</text>
</g>

<g>
<rect x="400" y="100" width="560" height="180" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="2"/>
<text x="680" y="128" text-anchor="middle" font-size="16" font-weight="600" fill="#712B13">Part Predictor  ★ trainable</text>
<text x="680" y="146" text-anchor="middle" font-size="12" fill="#993C1D">(Phase 3a architecture reused)</text>

<rect x="430" y="164" width="500" height="46" rx="6" fill="#FFFFFF" stroke="#993C1D"/>
<text x="680" y="186" text-anchor="middle" font-size="12" fill="#712B13">Transformer Decoder × L</text>
<text x="680" y="202" text-anchor="middle" font-size="11" fill="#993C1D">K queries cross-attend voxel features</text>

<rect x="430" y="220" width="500" height="48" rx="6" fill="#FBEAF0" stroke="#993556"/>
<text x="680" y="242" text-anchor="middle" font-size="13" font-weight="600" fill="#72243E">soft mask M ∈ ℝ^(K×N)</text>
<text x="680" y="258" text-anchor="middle" font-size="11" fill="#993556">differentiable per-voxel assignment</text>
</g>

<!-- Stage 2+4 → Part Predictor (horizontal) -->
<path d="M320 138 L400 138" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="330" y="128" font-size="11" fill="#085041">z_slat</text>

<!-- ===== Row 2: soft latent split ===== -->
<g>
<rect x="60" y="320" width="900" height="126" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text x="510" y="348" text-anchor="middle" font-size="16" font-weight="600" fill="#2C2C2A">Soft latent split  (differentiable)</text>
<text x="510" y="365" text-anchor="middle" font-size="11" fill="#5F5E5A">apply soft mask M to structured latent z_slat</text>

<rect x="100" y="378" width="240" height="56" rx="6" fill="#FBEAF0" stroke="#993556"/>
<text x="220" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#72243E">part 0 latent</text>
<text x="220" y="418" text-anchor="middle" font-size="11" fill="#993556">z_slat ⊙ M_0</text>

<rect x="390" y="378" width="240" height="56" rx="6" fill="#FBEAF0" stroke="#993556"/>
<text x="510" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#72243E">part 1 latent</text>
<text x="510" y="418" text-anchor="middle" font-size="11" fill="#993556">z_slat ⊙ M_1</text>

<rect x="680" y="378" width="240" height="56" rx="6" fill="#FBEAF0" stroke="#993556"/>
<text x="800" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#72243E">part k latent</text>
<text x="800" y="418" text-anchor="middle" font-size="11" fill="#993556">z_slat ⊙ M_k</text>
</g>

<!-- Part Predictor → split (vertical, center) -->
<path d="M680 280 L680 320" fill="none" stroke="#993556" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="690" y="304" font-size="11" fill="#72243E">M (soft)</text>

<!-- Stage 2+4 z_slat → split (down lane at x=40 to center) -->
<path d="M190 176 L190 290 L40 290 L40 385 L100 385" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ===== Row 3: frozen decoder ===== -->
<g>
<rect x="60" y="476" width="900" height="96" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
<text x="510" y="504" text-anchor="middle" font-size="16" font-weight="600" fill="#085041">Stage 3 · SLat VAE Decoder  (frozen, GS head)</text>
<text x="510" y="524" text-anchor="middle" font-size="12" fill="#0F6E56">shared weights · applied to each part latent independently</text>
<text x="510" y="544" text-anchor="middle" font-size="11" fill="#5F5E5A">gradient passes through · parameters not updated</text>
</g>

<!-- part latents → decoder (3 vertical arrows) -->
<path d="M220 434 L220 476" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<path d="M510 434 L510 476" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<path d="M800 434 L800 476" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ===== Row 4: per-part meshes ===== -->
<g>
<rect x="100" y="612" width="240" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B"/>
<text x="220" y="636" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">mesh_0 (pred)</text>
<text x="220" y="654" text-anchor="middle" font-size="11" fill="#854F0B">GS → mesh</text>
</g>
<g>
<rect x="390" y="612" width="240" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B"/>
<text x="510" y="636" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">mesh_1 (pred)</text>
<text x="510" y="654" text-anchor="middle" font-size="11" fill="#854F0B">GS → mesh</text>
</g>
<g>
<rect x="680" y="612" width="240" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B"/>
<text x="800" y="636" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">mesh_k (pred)</text>
<text x="800" y="654" text-anchor="middle" font-size="11" fill="#854F0B">GS → mesh</text>
</g>

<!-- decoder → meshes -->
<path d="M220 572 L220 612" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<path d="M510 572 L510 612" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<path d="M800 572 L800 612" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ===== Row 5: GT per-part meshes ===== -->
<g>
<rect x="60" y="702" width="900" height="54" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text x="510" y="724" text-anchor="middle" font-size="14" font-weight="600" fill="#633806">GT per-part meshes</text>
<text x="510" y="742" text-anchor="middle" font-size="11" fill="#854F0B">matched to predicted parts via Hungarian (from Phase 3a)</text>
</g>

<!-- ===== Row 6: Chamfer loss ===== -->
<g>
<rect x="60" y="790" width="900" height="80" rx="12" fill="#FCEBEB" stroke="#A32D2D" stroke-width="2"/>
<text x="510" y="816" text-anchor="middle" font-size="16" font-weight="600" fill="#501313">ℒ_decode = Σ_k Chamfer(mesh_k^pred, mesh_k^GT)</text>
<text x="510" y="836" text-anchor="middle" font-size="12" fill="#791F1F">differentiable surface distance · per-part, summed over K parts</text>
<text x="510" y="854" text-anchor="middle" font-size="11" fill="#791F1F">total: ℒ_part = ℒ_mask + ℒ_class + λ_dec · ℒ_decode  (warmup λ_dec)</text>
</g>

<!-- meshes → loss (vertical) -->
<path d="M220 672 L220 790" fill="none" stroke="#A32D2D" stroke-width="1.3" marker-end="url(#arr)"/>
<path d="M510 672 L510 702" fill="none" stroke="#A32D2D" stroke-width="1.3" marker-end="url(#arr)"/>
<path d="M800 672 L800 790" fill="none" stroke="#A32D2D" stroke-width="1.3" marker-end="url(#arr)"/>
<!-- GT → loss -->
<path d="M510 756 L510 790" fill="none" stroke="#854F0B" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- ===== Gradient path (all the way back to Part Predictor via right lane) ===== -->
<path d="M960 830 L1000 830 L1000 240 L960 240" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
<text x="975" y="540" font-size="12" fill="#A32D2D" transform="rotate(-90 975 540)">∇ → Part Predictor only</text>

<!-- ===== Legend ===== -->
<g transform="translate(60, 900)">
<text x="0" y="0" font-size="14" font-weight="600" fill="#2C2C2A">Legend</text>

<rect x="0" y="14" width="18" height="14" rx="3" fill="#FAECE7" stroke="#993C1D"/>
<text x="26" y="26" font-size="12" fill="#712B13">trainable (Part Predictor)</text>

<rect x="200" y="14" width="18" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="226" y="26" font-size="12" fill="#085041">frozen (Stage 2/4, decoder)</text>

<rect x="420" y="14" width="18" height="14" rx="3" fill="#FBEAF0" stroke="#993556"/>
<text x="446" y="26" font-size="12" fill="#72243E">per-part latent</text>

<rect x="570" y="14" width="18" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B"/>
<text x="596" y="26" font-size="12" fill="#633806">mesh / GT</text>

<rect x="710" y="14" width="18" height="14" rx="3" fill="#FCEBEB" stroke="#A32D2D"/>
<text x="736" y="26" font-size="12" fill="#501313">loss</text>

<line x1="790" y1="21" x2="820" y2="21" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="826" y="26" font-size="12" fill="#501313">gradient</text>
</g>
</svg>
