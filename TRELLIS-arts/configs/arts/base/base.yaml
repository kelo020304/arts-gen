# 基础训练配置 — 所有 Stage 共享的默认值
# 各 Stage 配置通过 _base_ 继承此文件

# Stage dispatch field (D-11): train_arts.py reads this to select trainer module.
# Each variant YAML below should override this via thin override (or rely on
# stage subdirectory's mid-level yaml — see ss_flow_art/mv_4view.yaml etc.).
stage: ss_flow_art       # default; ss_flow_art/* yaml will keep this; slat_flow_art/* override to slat_flow_art; etc.

training:
  batch_size_per_gpu: 1
  batch_split: 1
  max_steps: 50000
  optimizer:
    name: AdamW
    args:
      lr: 1.0e-5
      weight_decay: 0.0
      betas: [0.9, 0.999]
  lr_scheduler: null
  grad_clip: 1.0
  ema_rate: 0.9999
  fp16_mode: amp
  i_print: 100
  i_log: 50
  i_sample: 5000
  i_save: 5000
  i_ddpcheck: 10000
  output_dir: output/default

wandb:
  project: arts-reconstruction
  enabled: false
  mode: disabled

lora:
  enabled: false
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: all_attn
