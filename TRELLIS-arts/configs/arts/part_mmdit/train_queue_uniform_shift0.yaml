_base_: train_overnight.yaml

flow:
  type: rectified
  latent_scale: 8.0
  t_schedule: uniform
  timestep_shift: 0.0
  dynamic_timestep_shift: false
  num_steps: 20
  solver: euler
  s_name: 1.0
  s_anchor: 1.0

eval:
  fixed_every: 2000
  eval_every: 2000
  queue_metrics: true
  smoke_metrics: false
  cond_only: true
  decode: true
  ss_decoder_ckpt: /root/code/arts-gen/pretrained/TRELLIS-image-large/ckpts/ss_dec_conv3d_16l8_fp16.safetensors
  size_bucket_boundaries: [500.0, 3000.0]
  max_samples: 320
  train_max_samples: 320
  batch_size: 4
  velocity_max_samples: 64
  velocity_batch_size: 4
  velocity_t_values: [0.02, 0.1, 0.3, 0.5, 0.9]
  metrics_markdown_path: code_update/code_update_part_mmdit.md

training:
  seed: 42
  batch_size: 24
  max_steps: 20000
  lr: 2.0e-4
  warmup_steps: 500
  weight_decay: 0.01
  grad_clip: 1.0
  fp16: true
  num_workers: 4
  log_every: 10
  checkpoint_every: 2000
  output_dir: /robot/data-lab/jzh/art-gen/outputs/part_mmdit_queue_uniform_shift0
