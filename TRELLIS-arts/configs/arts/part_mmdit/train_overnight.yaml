stage: part_mmdit

model:
  resolution: 16
  latent_channels: 8
  model_channels: 1024
  cond_dim: 1024
  num_blocks: 12
  num_heads: 16
  patch_size: 2
  num_views: 4
  max_parts: 20
  cross_part_layers: [3, 6, 9]
  clip_name_dim: 768
  use_fp16: false
  use_checkpoint: true

data:
  data_root: /robot/data-lab/jzh/art-gen/data/PhysX-Mobility-full-4view-0511/PhysX-Mobility-full-4view-0511
  recon_subdir: reconstruction
  mask_subdir: renders
  manifest_path: manifests/part_completion/arts_mllm_physx-mobility.train.jsonl
  num_views: 4
  exclude_obj_ids:
    - "100194"
    - "100279"
    - "100282"
    - "100283"
    - "100395"
    - "100405"
    - "100712"
    - "100814"
    - "100816"
    - "101002"
    - "101023"
    - "101034"
    - "101049"
    - "101068"
    - "101080"
    - "101106"
    - "101114"
    - "101133"
    - "101236"
    - "101245"
    - "101253"
    - "101352"
    - "101564"
    - "101591"
    - "101604"
    - "101773"
    - "101808"
    - "101908"
    - "101917"
    - "101921"
    - "101924"
    - "101930"

flow:
  type: rectified
  latent_scale: 8.0
  t_schedule: uniform
  timestep_shift: 0.0
  num_steps: 20
  solver: euler
  s_name: 1.0
  s_anchor: 1.0

loss:
  part_weight_mode: raw_voxel_count
  part_weight_ref_mode: median
  part_weight_alpha: 0.5
  part_weight_min: 0.5
  part_weight_max: 3.0
  normalize_part_weights_per_object: true
  object_balanced: true
  object_weight_mode: none
  object_weight_k_ref: null
  object_weight_min: 0.75
  object_weight_max: 2.0
  cfg_dropout_name: 0.1
  cfg_dropout_anchor: 0.1

eval:
  fixed_every: 2000
  ss_decoder_ckpt: /root/code/arts-gen/pretrained/TRELLIS-image-large/ckpts/ss_dec_conv3d_16l8_fp16.safetensors
  size_bucket_boundaries: [500.0, 3000.0]
  max_samples: 320
  metrics_markdown_path: code_update/code_update_part_mmdit.md
  data:
    data_root: /robot/data-lab/jzh/art-gen/data/PhysX-Mobility-full-4view-0511/PhysX-Mobility-full-4view-0511
    recon_subdir: reconstruction
    mask_subdir: renders
    manifest_path: manifests/part_completion/arts_mllm_physx-mobility.train.jsonl
    num_views: 4
    include_obj_ids:
      - "100194"
      - "100279"
      - "100282"
      - "100283"
      - "100395"
      - "100405"
      - "100712"
      - "100814"
      - "100816"
      - "101002"
      - "101023"
      - "101034"
      - "101049"
      - "101068"
      - "101080"
      - "101106"
      - "101114"
      - "101133"
      - "101236"
      - "101245"
      - "101253"
      - "101352"
      - "101564"
      - "101591"
      - "101604"
      - "101773"
      - "101808"
      - "101908"
      - "101917"
      - "101921"
      - "101924"
      - "101930"

training:
  seed: 42
  batch_size: 24
  max_steps: 2400
  lr: 2.0e-4
  warmup_steps: 500
  weight_decay: 0.01
  grad_clip: 1.0
  fp16: true
  num_workers: 4
  log_every: 10
  checkpoint_every: 2000
  output_dir: /robot/data-lab/jzh/art-gen/outputs/part_mmdit_train_v1

wandb:
  enabled: false
