stage: part_mmdit

model:
  resolution: 16
  latent_channels: 8
  model_channels: 1024
  cond_dim: 1024
  num_blocks: 12
  num_heads: 16
  patch_size: 2
  num_views: 4
  max_parts: 20
  cross_part_layers: [3, 6, 9]
  clip_name_dim: 768
  use_fp16: false
  use_checkpoint: true

data:
  data_root: /robot/data-lab/jzh/art-gen/data/PhysX-Mobility-full-4view-0511/PhysX-Mobility-full-4view-0511
  recon_subdir: reconstruction
  mask_subdir: renders
  manifest_path: manifests/part_completion/arts_mllm_physx-mobility.train.jsonl
  num_views: 4
  exclude_obj_ids:
    - "100015"
    - "100194"
    - "102276"
    - "103878"
    - "103126"
    - "102557"
    - "104007"
    - "103869"
    - "103524"
    - "101947"
