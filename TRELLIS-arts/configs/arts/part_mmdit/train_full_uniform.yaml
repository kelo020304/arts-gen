    - "103046"
    - "103528"
    - "103121"
    - "103351"
    - "100395"
    - "103561"
    - "103776"

flow:
  type: rectified
  latent_scale: 8.0
  t_schedule: uniform
  timestep_shift: 0.0
  dynamic_timestep_shift: false
  num_steps: 20
  solver: euler
  s_name: 1.0
  s_anchor: 1.0

loss:
  part_weight_mode: raw_voxel_count
  part_weight_ref_mode: median
  part_weight_alpha: 0.5
  part_weight_min: 0.5
  part_weight_max: 3.0
  normalize_part_weights_per_object: true
  object_balanced: true
  object_weight_mode: none
  object_weight_k_ref: null
  object_weight_min: 0.75
  object_weight_max: 2.0
  cfg_dropout_name: 0.1
  cfg_dropout_anchor: 0.1

eval:
  fixed_every: 2000
  eval_every: 2000
  queue_metrics: true
  smoke_metrics: false
  cond_only: true
  decode: true
  ss_decoder_ckpt: /root/code/arts-gen/pretrained/TRELLIS-image-large/ckpts/ss_dec_conv3d_16l8_fp16.safetensors
  size_bucket_boundaries: [500.0, 3000.0]
  max_samples: 320
  train_max_samples: 320
  batch_size: 4
  prefer_obj_ids:
    - "100015"
    - "100194"
    - "102276"
  train_prefer_obj_ids:
    - "100017"
    - "100075"
    - "100058"
  velocity_max_samples: 64
  velocity_batch_size: 4
  velocity_t_values: [0.02, 0.1, 0.3, 0.5, 0.9]
  metrics_markdown_path: code_update/code_update_part_mmdit.md
  data:
    data_root: /robot/data-lab/jzh/art-gen/data/PhysX-Mobility-full-4view-0511/PhysX-Mobility-full-4view-0511
    recon_subdir: reconstruction
    mask_subdir: renders
    manifest_path: manifests/part_completion/arts_mllm_physx-mobility.train.jsonl
    num_views: 4
    include_obj_ids:
      - "100015"
      - "100194"
      - "102276"
      - "103878"
      - "103126"
      - "102557"
      - "104007"
      - "103869"
      - "103524"
      - "101947"
      - "101245"
      - "100491"
      - "49062"
      - "48497"
      - "103916"
      - "102130"
      - "103972"
      - "100854"
      - "100279"
      - "103016"
      - "100712"
      - "101773"
      - "103996"
      - "102523"
      - "103347"
      - "103046"
      - "103528"
      - "103121"
      - "103351"
      - "100395"
      - "103561"
      - "103776"

training:
  seed: 42
  batch_size: 24
  max_steps: 20000
  lr: 2.0e-4
  warmup_steps: 1000
  weight_decay: 0.01
  grad_clip: 1.0
  fp16: true
  num_workers: 4
  log_every: 10
  checkpoint_every: 2000
  output_dir: /robot/data-lab/jzh/art-gen/outputs/part_mmdit_full_uniform

wandb:
  enabled: false
