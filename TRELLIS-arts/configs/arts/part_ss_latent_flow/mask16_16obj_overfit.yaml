  velocity_contrastive_weight: 0.0
  identity_contrastive_weight: 0.05
  relative_endpoint_weight: 0.25
  foreground_weight:
    enabled: true
    bg_weight: 0.1
    dilate: 0

eval:
  fixed_every: 0
  all_every: 0
  decode_every: 0
  decode_max_samples: 16
