_base_: mv_4view.yaml

stage: ss_flow_global_z

model:
  args:
    use_checkpoint: true
    use_camera_pose: false

data:
  tokens_subdir: dinov2_tokens_official_prenorm1374
  ignore_manifest_dinov2_tokens_path: true
  condition_mode: single_view
  token_count: 1374
  token_dim: 1024
  cache_in_memory: false

training:
  seed: 42
  max_steps: 50000
  batch_size_per_gpu: 4
  batch_split: 1
  num_workers: 4
  prefetch_data: true
  optimizer:
    name: AdamW
    args:
      lr: 5.0e-5
      weight_decay: 0.0
      betas: [0.9, 0.999]
  lr_scheduler:
    name: LinearWarmupLRScheduler
    args:
      warmup_steps: 1000
  grad_clip: 1.0
  ema_rate: [0.999, 0.9999]
  fp16_mode: inflat_all
  p_uncond: 0.1
  output_dir: /robot/data-lab/jzh/art-gen-output/tre_mf_4view_0611
  pretrained_ckpt: /robot/data-lab/jzh/art-gen/weights/ss_flow_img_dit_L_16l8_fp16.safetensors
  i_print: 100
  i_log: 50
  i_sample: 999999
  i_save: 5000
  i_ddpcheck: 999999

snapshot:
  enabled: false

wandb:
  enabled: false
  mode: disabled
  name: ss-flow-official-single-multiflow-full-0611

lora:
  enabled: false
