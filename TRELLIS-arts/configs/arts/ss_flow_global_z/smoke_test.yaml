# Small local smoke for 4view token -> global z SS flow.

_base_: mv_4view.yaml

stage: ss_flow_global_z

model:
  args:
    use_checkpoint: true

data:
  test_obj_ids: ["100015"]
  max_samples: 1

training:
  seed: 42
  max_steps: 30
  batch_size_per_gpu: 1
  batch_split: 1
  optimizer:
    name: AdamW
    args:
      lr: 1.0e-4
      weight_decay: 0.0
      betas: [0.9, 0.999]
  lr_scheduler: null
  grad_clip: 1.0
  fp16_mode: inflat_all
  p_uncond: 0.1
  output_dir: output/ss_flow_global_z_smoke_test
  i_print: 1
  i_log: 1
  i_sample: 999999
  i_save: 999999
  i_ddpcheck: 999999

snapshot:
  enabled: true
  num_samples: 1
  batch_size: 1
  num_steps: 8
  cfg_strength: 3.0
  decode_threshold: 0.0
  verbose: false

wandb:
  project: arts-reconstruction
  name: ss-flow-global-z-smoke
  mode: disabled
