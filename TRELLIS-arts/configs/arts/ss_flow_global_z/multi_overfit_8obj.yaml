# Multi-object overfit gate for 4view tokens -> whole-object global SS latent.

_base_: mv_4view.yaml

stage: ss_flow_global_z

model:
  args:
    use_checkpoint: true

data:
  test_samples:
    - {obj_id: "100015", angle_idx: 0}  # Cookware / kitchen pot
    - {obj_id: "10068", angle_idx: 3}   # Home appliance / refrigerator
    - {obj_id: "100282", angle_idx: 6}  # Home appliance / washing machine
    - {obj_id: "100532", angle_idx: 2}  # Furniture / folding chair
    - {obj_id: "100249", angle_idx: 6}  # Luggage / suitcase
    - {obj_id: "101073", angle_idx: 0}  # Transport equipment / cart
    - {obj_id: "10040", angle_idx: 5}   # Electronic device / laptop
    - {obj_id: "100279", angle_idx: 0}  # Office equipment / printer
  max_samples: 8

training:
  seed: 42
  max_steps: 800
  batch_size_per_gpu: 2
  batch_split: 1
  optimizer:
    name: AdamW
    args:
      lr: 1.0e-4
      weight_decay: 0.0
      betas: [0.9, 0.999]
  lr_scheduler: null
  grad_clip: 1.0
  fp16_mode: inflat_all
  p_uncond: 0.1
  output_dir: output/ss_flow_global_z_multi_overfit_8obj_800
  i_print: 25
  i_log: 10
  i_sample: 200
  i_save: 999999
  i_ddpcheck: 999999

snapshot:
  enabled: true
  num_samples: 8
  batch_size: 2
  num_steps: 20
  cfg_strength: 3.0
  decode_threshold: 0.0
  seed: 1234
  verbose: false

wandb:
  project: arts-reconstruction
  name: ss-flow-global-z-multi-overfit-8obj
  mode: disabled
