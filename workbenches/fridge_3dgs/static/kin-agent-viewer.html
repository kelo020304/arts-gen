<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kin Agent Motion Preview</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #101210; color: #ecefec; font: 12px system-ui, sans-serif; }
      canvas { display: block; width: 100%; height: 100%; }
      .bar { position: absolute; inset: 10px 10px auto 10px; z-index: 2; display: flex; align-items: center; gap: 8px; padding: 7px; border: 1px solid #3a403b; border-radius: 6px; background: rgba(18, 21, 18, .92); }
      .bar strong { margin-right: auto; }
      select, button { min-height: 30px; border: 1px solid #4a524c; border-radius: 5px; background: #202520; color: inherit; }
      button { width: 34px; font-size: 16px; }
      .state { position: absolute; left: 10px; bottom: 10px; z-index: 2; padding: 6px 8px; border: 1px solid #3a403b; border-radius: 5px; background: rgba(18, 21, 18, .88); color: #b8c0ba; }
    </style>
  </head>
  <body>
    <div class="bar"><strong>Predicted motion</strong><select id="partSelect"></select><button id="playButton" title="Pause motion">Ⅱ</button></div>
    <div id="state" class="state">Loading decoded meshes</div>
    <script src="../kin-shared/three.min.js"></script>
    <script src="../kin-shared/GLTFLoader.js"></script>
    <script src="../kin-shared/OrbitControls.js"></script>
    <script src="js/kin-agent-viewer.js?v=20260713-kin-agent-v7"></script>
  </body>
</html>
